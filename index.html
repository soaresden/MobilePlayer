<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <script src="playlist.js"></script>
    <script src="jingles.js"></script>
    <style>
        /* CACHE PROGRESS BAR */
        #cache-bar { position:fixed; bottom:0; left:0; right:0; z-index:500;
            background:rgba(0,0,0,.85); padding:10px 16px 14px;
            display:flex; flex-direction:column; gap:6px;
            transform:translateY(100%); transition:transform .3s; }
        #cache-bar.show { transform:translateY(0); }
        #cache-bar-top { display:flex; justify-content:space-between; align-items:center; }
        #cache-bar-lbl { font-size:24px; color:var(--light); }
        #cache-bar-pct { font-size:24px; font-weight:700; color:var(--green); }
        #cache-rail { height:3px; background:rgba(255,255,255,.12); border-radius:2px; }
        #cache-fill { height:100%; width:0%; background:var(--green); border-radius:2px; transition:width .4s; }
    </style>
    <style>
        :root { --green:#1DB954; --black:#121212; --dark:#181818; --grey:#282828; --mid:#535353; --light:#b3b3b3; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }
        html,body { height:100%; overflow:hidden; background:var(--black);
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:#fff; }

        /* STATUS BAR */
        .sbar { position:fixed; top:0; left:0; right:0; height:44px; display:flex; align-items:center;
            justify-content:space-between; padding:0 22px; z-index:300; pointer-events:none; }
        .sbar-time { font-size:30px; font-weight:700; }
        .sbar-icons { display:flex; align-items:center; gap:6px; font-size:26px; }

        /* VIEWS */
        .view { position:fixed; inset:0; display:flex; flex-direction:column; background:var(--black);
            overflow:hidden; transition:transform .38s cubic-bezier(.4,0,.2,1); will-change:transform; }
        #vp   { transform:translateX(0);    z-index:1; }
        #vpl  { transform:translateX(100%); z-index:2; }
        #vlyr { transform:translateY(100%); z-index:3; }
        body.pl-open  #vp  { transform:translateX(-28%); }
        body.pl-open  #vpl { transform:translateX(0); }
        body.lyr-open #vlyr { transform:translateY(0); }
        #vp::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,.55);
            opacity:0; transition:opacity .38s; pointer-events:none; z-index:10; }
        body.pl-open #vp::after { opacity:1; }

        /* SHARED */
        .ibtn { background:none; border:none; color:#fff; width:60px; height:60px;
            display:flex; align-items:center; justify-content:center; font-size:36px; cursor:pointer; flex-shrink:0; }
        .dim { color:var(--light) !important; opacity:.5; }

        /* PLAYER BG */
        .pbg { position:absolute; inset:0;
            background:linear-gradient(160deg,#4a2020 0%,#2a1515 25%,#1a1010 45%,var(--black) 68%);
            z-index:0; transition:background 1.2s ease; }
        .pc { position:relative; z-index:1; display:flex; flex-direction:column; height:100%; padding:0 24px 28px; }

        /* TOP BAR */
        .topbar { display:flex; align-items:center; justify-content:space-between; padding-top:54px; padding-bottom:6px; }
        .topbar-c { text-align:center; flex:1; }
        .topbar-ttl { font-size:28px; font-weight:700; }
        .mode-btns { display:flex; justify-content:center; gap:4px; margin-top:6px; }
        .mbtn { background:rgba(255,255,255,.08); border:none; border-radius:20px; padding:8px 18px;
            font-size:28px; cursor:pointer; transition:background .15s, transform .1s; line-height:1; }
        .mbtn:active { transform:scale(.92); }
        .mbtn.active { background:rgba(255,255,255,.22); outline:1.5px solid rgba(255,255,255,.3); }

        /* ARTWORK */
        .art-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:10px 0; }
        .art { width:100%; max-width:300px; aspect-ratio:1; border-radius:8px;
            box-shadow:0 16px 48px rgba(0,0,0,.75); object-fit:cover; background:var(--grey);
            cursor:pointer; transition:transform .2s; }
        .art.pulse  { transform:scale(1.02); }
        .art.locked { outline:2px solid rgba(29,185,84,.35); outline-offset:3px; }

        /* TRACK INFO */
        .tinfo { display:flex; align-items:center; justify-content:space-between; margin-bottom:14px; }
        .ttext { flex:1; overflow:hidden; }
        .ttitle  { font-size:42px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tartist { font-size:28px; color:var(--light); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .lang-badge { font-size:36px; flex-shrink:0; margin-left:8px; opacity:.8; }

        /* PROGRESS */
        .prog-wrap { margin-bottom:20px; }
        .prog-hit  { width:100%; padding:14px 0; margin:-14px 0; cursor:pointer; }
        .prog-rail { height:4px; background:rgba(255,255,255,.18); border-radius:2px; position:relative; }
        .prog-fill { height:100%; width:0%; background:#fff; border-radius:2px; position:absolute; top:0; }
        .prog-hit:active .prog-fill { background:var(--green); }
        .prog-thumb { width:14px; height:14px; background:#fff; border-radius:50%; position:absolute;
            top:50%; left:0%; transform:translate(-50%,-50%); opacity:0; transition:opacity .15s; pointer-events:none; }
        .prog-hit:active .prog-thumb { opacity:1; }
        .prog-times { display:flex; justify-content:space-between; margin-top:10px; font-size:22px; color:var(--light); font-weight:500; }

        /* CONTROLS */
        .ctrls { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
        .cbtn { background:none; border:none; color:#fff; display:flex; align-items:center;
            justify-content:center; cursor:pointer; position:relative; }
        .cbtn.active { color:var(--green); }
        .cbtn.active::after { content:''; position:absolute; bottom:-6px; left:50%;
            transform:translateX(-50%); width:4px; height:4px; background:var(--green); border-radius:50%; }
        .cbtn-skip { font-size:56px; }
        .cbtn-mini { font-size:40px; color:var(--light); }
        .cbtn-play { width:96px; height:96px; background:#fff; color:#000; border-radius:50%;
            font-size:42px; box-shadow:0 6px 20px rgba(0,0,0,.4); transition:transform .1s; }
        .cbtn-play:active { transform:scale(.94); }

        /* BOTTOM BAR */
        .bbar { display:flex; align-items:center; justify-content:center; }
        .bbar .ibtn { color:var(--light); }

        /* TOPBAR icon buttons (smaller than ibtn default) */
        .topbar-actions { display:flex; gap:2px; }
        .topbar-actions .ibtn { width:44px; height:44px; font-size:26px; }

        /* Per-track cache dot */
        .titem-cache { width:28px; text-align:center; font-size:20px; flex-shrink:0; }

        /* PLAYLIST VIEW */
        .plhdr { background:linear-gradient(to bottom,#4a2020,#2a1515 50%,#181818); padding:0 16px; flex-shrink:0; }
        .pltop { display:flex; align-items:center; justify-content:space-between; padding-top:54px; padding-bottom:12px; }
        .pltop-ttl { font-size:28px; font-weight:600; }
        .plhero { display:flex; flex-direction:column; align-items:center; padding:4px 0 18px; }
        .plcover { width:168px; height:168px; border-radius:6px; object-fit:cover;
            box-shadow:0 10px 36px rgba(0,0,0,.7); background:var(--grey); margin-bottom:20px; }
        .plname  { font-size:48px; font-weight:700; text-align:center; }
        .pldesc  { font-size:26px; color:var(--light); margin-top:6px; text-align:center; }
        .plmeta  { font-size:24px; color:var(--mid); margin-top:4px; }
        .plactions { display:flex; align-items:center; justify-content:space-between; padding:14px 0 16px; }
        .plbtns { display:flex; gap:10px; }
        .lbtn { border:none; border-radius:50px; font-size:26px; font-weight:700; padding:18px 32px;
            cursor:pointer; display:flex; align-items:center; gap:8px; }
        .lbtn:active { opacity:.8; }
        .lbtn-outline { background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,.25); }
        .lbtn-green   { background:var(--green); color:#000; }
        .tlist { flex:1; overflow-y:auto; padding:4px 16px 80px; background:var(--dark); -webkit-overflow-scrolling:touch; }
        .tlist::-webkit-scrollbar { display:none; }
        .titem { display:flex; align-items:center; padding:9px 4px; gap:12px;
            cursor:pointer; border-radius:6px; transition:background .1s; }
        .titem:active { background:rgba(255,255,255,.06); }
        .tnum  { width:36px; text-align:center; font-size:28px; color:var(--light); flex-shrink:0; }
        .tnum.now { color:var(--green); font-size:22px; }
        .tiinfo { flex:1; overflow:hidden; }
        .tittl  { font-size:28px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tittl.now { color:var(--green); }
        .tartst { font-size:24px; color:var(--light); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .titem-flag { font-size:26px; flex-shrink:0; opacity:.7; }
        .pl-section { padding:18px 4px 8px; font-size:22px; font-weight:700;
            letter-spacing:1.5px; text-transform:uppercase; color:var(--mid); }

        /* LYRICS VIEW */
        .lyr-hdr { background:linear-gradient(to bottom,#1a1a2e,#0f0f1a); padding:54px 16px 16px;
            flex-shrink:0; display:flex; align-items:center; gap:12px; }
        .lyr-mini-art { width:44px; height:44px; border-radius:4px; object-fit:cover; background:var(--grey); flex-shrink:0; }
        .lyr-meta { flex:1; overflow:hidden; }
        .lyr-track  { font-size:28px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .lyr-artist { font-size:24px; color:var(--light); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .lyr-body { flex:1; overflow-y:auto; padding:24px 28px 100px; -webkit-overflow-scrolling:touch; background:var(--black); }
        .lyr-body::-webkit-scrollbar { display:none; }
        #lyr-lines { display:flex; flex-direction:column; gap:4px; }
        .lyr-line { font-size:46px; font-weight:700; line-height:1.35; padding:10px 0;
            color:rgba(255,255,255,.2); transition:color .35s, font-size .25s; cursor:default; }
        .lyr-line.past { color:rgba(255,255,255,.15); }
        .lyr-line.now  { color:#fff; font-size:54px; }
        .lyr-empty { font-size:32px; color:var(--mid); text-align:center; padding:48px 0; }
        .lyr-ctrl { position:fixed; bottom:0; left:0; right:0; z-index:4;
            background:linear-gradient(to top,rgba(0,0,0,.95) 70%,transparent);
            display:flex; align-items:center; justify-content:space-around; padding:20px 16px 28px; }
        .lyr-ctrl .cbtn-play { width:80px; height:80px; font-size:38px; }

        /* MISC */
        @keyframes spin { to { transform:rotate(360deg); } }
        .spin { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.2);
            border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
    </style>
</head>
<body>

    <!-- CACHE PROGRESS -->
    <div id="cache-bar">
        <div id="cache-bar-top">
            <span id="cache-bar-lbl">Mise en cache hors-ligne…</span>
            <span id="cache-bar-pct">0%</span>
        </div>
        <div id="cache-rail"><div id="cache-fill"></div></div>
    </div>

    <div class="sbar">
        <span class="sbar-time" id="sbar-time">9:41</span>
        <div class="sbar-icons">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-three-quarters" style="font-size:30px"></i>
        </div>
    </div>

    <audio id="audio"></audio>

    <!-- VIEW 1 — PLAYER -->
    <div id="vp" class="view">
        <div class="pbg" id="player-bg"></div>
        <div class="pc">
            <div class="topbar">
                <button class="ibtn" id="btn-open-pl"><i class="fa-solid fa-chevron-down"></i></button>
                <div class="topbar-c">
                    <div class="topbar-ttl">AlbaFrancia FM</div>
                    <div class="mode-btns">
                        <button class="mbtn" id="m-fr"   title="Musique française seulement">🇫🇷</button>
                        <button class="mbtn" id="m-both" title="Les deux en alternance">🇫🇷🇦🇱</button>
                        <button class="mbtn active" id="m-sq" title="Reprises albanaises seulement">🇦🇱</button>
                    </div>
                </div>
                <div class="topbar-actions">
                    <button class="ibtn dim" id="btn-lyrics"    title="Paroles"><i class="fa-solid fa-align-left"></i></button>
                    <button class="ibtn dim" id="btn-cache-cur" title="Mettre en cache ce morceau"><i class="fa-solid fa-cloud-arrow-down" id="cache-cur-icon"></i></button>
                </div>
            </div>

            <div class="art-wrap">
                <img id="artwork" class="art" src="cover.png" alt="AlbaFrancia FM">
            </div>

            <div class="tinfo">
                <div class="ttext">
                    <div class="ttitle"  id="track-title"><span class="spin"></span></div>
                    <div class="tartist" id="track-artist">AlbaFrancia FM</div>
                </div>
                <span class="lang-badge" id="lang-badge"></span>
            </div>

            <div class="prog-wrap">
                <div class="prog-hit" id="prog-hit">
                    <div class="prog-rail">
                        <div class="prog-fill"  id="prog-fill"></div>
                        <div class="prog-thumb" id="prog-thumb"></div>
                    </div>
                </div>
                <div class="prog-times">
                    <span id="t-cur">0:00</span>
                    <span id="t-tot">0:00</span>
                </div>
            </div>

            <div class="ctrls">
                <button class="cbtn cbtn-mini active" id="btn-shuffle"><i class="fa-solid fa-shuffle"></i></button>
                <button class="cbtn cbtn-skip"        id="btn-prev"  ><i class="fa-solid fa-backward-step"></i></button>
                <button class="cbtn cbtn-play"        id="btn-play"  ><i class="fa-solid fa-play" id="play-icon"></i></button>
                <button class="cbtn cbtn-skip"        id="btn-next"  ><i class="fa-solid fa-forward-step"></i></button>
                <button class="cbtn cbtn-mini"        id="btn-repeat"><i class="fa-solid fa-repeat"></i></button>
            </div>

        </div>
    </div>

    <!-- VIEW 2 — PLAYLIST -->
    <div id="vpl" class="view">
        <div class="plhdr" id="pl-hdr">
            <div class="pltop">
                <button class="ibtn" id="btn-close-pl"><i class="fa-solid fa-chevron-left"></i></button>
                <span class="pltop-ttl">AlbaFrancia FM</span>
                <button class="ibtn" id="btn-cache-all" title="Tout mettre en cache hors-ligne" style="color:var(--light)"><i class="fa-solid fa-cloud-arrow-down" id="cache-all-icon"></i></button>
            </div>
            <div class="plhero">
                <img id="pl-cover" class="plcover" src="cover.png" alt="AlbaFrancia FM">
                <div class="plname">AlbaFrancia FM</div>
                <div class="pldesc">Radio Albanaise · Musique Française 🇦🇱🇫🇷</div>
                <div class="plmeta" id="pl-count">… titres</div>
            </div>
            <div class="plactions">
                <div></div>
                <div class="plbtns">
                    <button class="lbtn lbtn-outline" id="btn-pl-shuffle"><i class="fa-solid fa-shuffle"></i> Aléatoire</button>
                    <button class="lbtn lbtn-green"   id="btn-pl-play"  ><i class="fa-solid fa-play"></i> Lire</button>
                </div>
            </div>
        </div>
        <div class="tlist" id="track-list"></div>
    </div>

    <!-- VIEW 3 — LYRICS -->
    <div id="vlyr" class="view">
        <div class="lyr-hdr">
            <button class="ibtn" id="btn-close-lyr"><i class="fa-solid fa-chevron-down"></i></button>
            <img id="lyr-mini-art" class="lyr-mini-art" src="cover.png" alt="">
            <div class="lyr-meta">
                <div class="lyr-track"  id="lyr-title"></div>
                <div class="lyr-artist" id="lyr-artist"></div>
            </div>
            <div style="width:40px"></div>
        </div>
        <div class="lyr-body">
            <div id="lyr-lines"></div>
        </div>
        <div class="lyr-ctrl">
            <button class="cbtn cbtn-mini" id="lyr-prev"><i class="fa-solid fa-backward-step"></i></button>
            <button class="cbtn cbtn-play" id="lyr-play"><i class="fa-solid fa-play" id="lyr-play-icon"></i></button>
            <button class="cbtn cbtn-mini" id="lyr-next"><i class="fa-solid fa-forward-step"></i></button>
        </div>
    </div>

<script>
'use strict';

// ══════════════════ CONFIG ════════════════════════════════════════════════
const CFG = Object.assign({
    radioName:      'AlbaFrancia FM',
    radioArtist:    'AlbaFrancia FM',
    jingleEveryMin: 2,
    jingleEveryMax: 4,
}, window.CONFIG || {});

const JINGLES   = window.JINGLES        || [];
const PL_FR     = window.PLAYLIST_FR    || [];
const PL_SQ     = window.PLAYLIST_SQ    || [];
const PL_PAIRS  = window.PLAYLIST_PAIRS || null;
const JINGLE_D  = 'jingles/';
const COVER     = 'cover.png';

// ══════════════════ STATE ═════════════════════════════════════════════════
// track = { file, dir, lrcPath, lang }
let tracks    = [];
let mode      = 'sq';     // 'fr' | 'sq' | 'both'
const metaDb  = {};       // "dir+file" → { title, artist, coverUrl }
let curIdx    = 0;
let isPlaying = false;
let isShuffle = true;
let isRepeat  = false;
let shuf      = [];
// 0 = cover radio (cover.png)  1 = pochette MP3  2 = paroles (lyrics ouvertes)
let artState = 0;

// jingle state
let isJingle      = false;
let curJingleFile = null;
let jingleCtr     = 0;
let nextJingle    = rng(CFG.jingleEveryMin, CFG.jingleEveryMax);

// lyrics state
let lyricsData = [];
let lyricsSync = false;  // true = LRC with timestamps, false = plain text
let lyrOpen    = false;
let curLyrLine = -1;

function rng(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

// ══════════════════ CACHE MAP ═════════════════════════════════════════════
const cacheMap = {};  // url → true

function trackUrl(i) {
    const t = tracks[i];
    return location.origin + '/' + t.dir + encodeURIComponent(t.file);
}

async function refreshCacheMap() {
    if (!('caches' in window)) return;
    try {
        const cache = await caches.open('albafm-v1');
        await Promise.all(tracks.map(async (_, i) => {
            const url = trackUrl(i);
            cacheMap[url] = !!(await cache.match(url));
        }));
    } catch {}
}

function updateCacheIcons() {
    // Met à jour uniquement les icônes cache dans la liste sans re-render complet
    tList.querySelectorAll('[data-kind="music"]').forEach(el => {
        const i = +el.dataset.idx;
        const dot = el.querySelector('.titem-cache i');
        if (!dot) return;
        const cached = !!cacheMap[trackUrl(i)];
        dot.className = cached ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-arrow-down';
        dot.style.color = cached ? 'var(--green)' : 'var(--mid)';
        dot.style.opacity = cached ? '1' : '0.4';
    });
}

async function cacheOneTrack(i) {
    const url = trackUrl(i);
    if (cacheMap[url]) return;  // déjà en cache
    try {
        const resp = await fetch(url);
        if (!resp.ok) return;
        const cache = await caches.open('albafm-v1');
        await cache.put(url, resp);
        cacheMap[url] = true;
    } catch {}
}

async function cacheCurrentTrack() {
    if (isJingle) return;
    const ico = document.getElementById('cache-cur-icon');
    const btn = document.getElementById('btn-cache-cur');
    ico.className = 'fa-solid fa-spinner fa-spin';
    await cacheOneTrack(curIdx);
    const cached = !!cacheMap[trackUrl(curIdx)];
    if (cached) {
        ico.className = 'fa-solid fa-cloud-check';
        btn.style.color = 'var(--green)';
        btn.classList.remove('dim');
    } else {
        ico.className = 'fa-solid fa-cloud-arrow-down';
    }
    updateCacheIcons();
}

function refreshCacheBtn() {
    if (isJingle) return;
    const ico = document.getElementById('cache-cur-icon');
    const btn = document.getElementById('btn-cache-cur');
    const cached = !!cacheMap[trackUrl(curIdx)];
    ico.className = cached ? 'fa-solid fa-cloud-check' : 'fa-solid fa-cloud-arrow-down';
    btn.style.color = cached ? 'var(--green)' : '';
    btn.classList.toggle('dim', !cached);
}

// ══════════════════ DOM ═══════════════════════════════════════════════════
const audio      = document.getElementById('audio');
const artwork    = document.getElementById('artwork');
const plCover    = document.getElementById('pl-cover');
const lyrMiniArt = document.getElementById('lyr-mini-art');
const tTitle     = document.getElementById('track-title');
const tArtist    = document.getElementById('track-artist');
const langBadge  = document.getElementById('lang-badge');
const pFill      = document.getElementById('prog-fill');
const pThumb     = document.getElementById('prog-thumb');
const pHit       = document.getElementById('prog-hit');
const tCur       = document.getElementById('t-cur');
const tTot       = document.getElementById('t-tot');
const tList      = document.getElementById('track-list');
const playIcon   = document.getElementById('play-icon');
const lyrPlIcon  = document.getElementById('lyr-play-icon');
const lyrLines   = document.getElementById('lyr-lines');
const lyrTitle   = document.getElementById('lyr-title');
const lyrArtist  = document.getElementById('lyr-artist');
const plCount    = document.getElementById('pl-count');
const playerBg   = document.getElementById('player-bg');

// ══════════════════ XHR ═══════════════════════════════════════════════════
function xget(url, type, ok, fail) {
    const r = new XMLHttpRequest();
    r.open('GET', url, true);
    r.responseType = type;
    r.onload  = () => (r.status === 0 || r.status === 200) ? ok(r.response) : fail && fail();
    r.onerror = () => fail && fail();
    r.send();
}

// ══════════════════ ID3v2 PARSER ══════════════════════════════════════════
function parseId3(buf) {
    const b = new Uint8Array(buf);
    const R = { title:null, artist:null, coverUrl:null, lyrics:null };
    if (b.length < 10 || b[0]!==73||b[1]!==68||b[2]!==51) return R;
    const ver = b[3], flgs = b[5];
    const tEnd = 10+(((b[6]&0x7F)<<21)|((b[7]&0x7F)<<14)|((b[8]&0x7F)<<7)|(b[9]&0x7F));
    let p = 10;
    if (ver>=3 && (flgs&0x40)) p += 4+((b[p]<<24)|(b[p+1]<<16)|(b[p+2]<<8)|b[p+3]);
    const end = Math.min(tEnd, b.length);
    while (p+(ver<3?6:10) < end) {
        let id, sz, hl;
        if (ver<3) { id=String.fromCharCode(b[p],b[p+1],b[p+2]); sz=(b[p+3]<<16)|(b[p+4]<<8)|b[p+5]; hl=6; }
        else {
            id=String.fromCharCode(b[p],b[p+1],b[p+2],b[p+3]);
            sz=ver>=4?(((b[p+4]&0x7F)<<21)|((b[p+5]&0x7F)<<14)|((b[p+6]&0x7F)<<7)|(b[p+7]&0x7F)):((b[p+4]<<24)|(b[p+5]<<16)|(b[p+6]<<8)|b[p+7]);
            hl=10;
        }
        if (sz<=0||sz>6_000_000) break;
        const fd = b.slice(p+hl, p+hl+sz);
        if ((id==='TIT2'||id==='TT2')  && !R.title)    R.title    = id3Txt(fd);
        if ((id==='TPE1'||id==='TP1')  && !R.artist)   R.artist   = id3Txt(fd);
        if ((id==='APIC'||id==='PIC')  && !R.coverUrl) R.coverUrl = id3Pic(fd, ver<3);
        if ((id==='USLT'||id==='ULT')  && !R.lyrics)   R.lyrics   = id3Uslt(fd);
        if (R.title && R.artist && R.coverUrl && R.lyrics) break;
        p += hl+sz;
    }
    return R;
}
function id3Txt(d) {
    if (!d||!d.length) return null;
    const enc=d[0], raw=d.slice(1);
    try {
        let s;
        if (enc===1) { const le=(raw[0]===0xFF&&raw[1]===0xFE); s=new TextDecoder(le?'utf-16le':'utf-16be').decode(le?raw.slice(2):raw); }
        else if (enc===2) s=new TextDecoder('utf-16be').decode(raw);
        else if (enc===3) s=new TextDecoder('utf-8').decode(raw);
        else s=new TextDecoder('latin1').decode(raw);
        return s.replace(/\0/g,'').trim()||null;
    } catch { return null; }
}
function id3Pic(d, v22) {
    if (!d||d.length<4) return null;
    try {
        let i=0; const enc=d[i++]; let mime;
        if (v22) { const f=String.fromCharCode(d[i++],d[i++],d[i++]); mime=(f==='PNG')?'image/png':'image/jpeg'; }
        else { mime=''; while(i<d.length&&d[i]!==0) mime+=String.fromCharCode(d[i++]); i++; }
        i++;
        if (enc===1||enc===2) { while(i<d.length-1&&!(d[i]===0&&d[i+1]===0)) i+=2; i+=2; }
        else { while(i<d.length&&d[i]!==0) i++; i++; }
        const pic=d.slice(i);
        if (pic.length<8) return null;
        return URL.createObjectURL(new Blob([pic],{type:mime||'image/jpeg'}));
    } catch { return null; }
}
function id3Uslt(d) {
    // USLT: [enc:1][lang:3][descriptor:null-term][lyrics]
    if (!d||d.length<5) return null;
    try {
        const enc=d[0]; let i=4; // skip enc+lang
        if (enc===1||enc===2) { while(i<d.length-1&&!(d[i]===0&&d[i+1]===0))i+=2; i+=2; }
        else { while(i<d.length&&d[i]!==0)i++; i++; }
        if (i>=d.length) return null;
        const raw=d.slice(i);
        const fake=new Uint8Array(raw.length+1); fake[0]=enc; fake.set(raw,1);
        const txt=id3Txt(fake);
        return txt?.trim()||null;
    } catch { return null; }
}

// ══════════════════ TRACK MODEL ═══════════════════════════════════════════
function mkFR(file) { return { file, dir:'music/', lang:'fr', lrcSuffix:'.lrcsource' }; }
function mkSQ(file) { return { file, dir:'suno/',  lang:'sq', lrcSuffix:'.lrc' }; }

function buildTracks() {
    if (mode === 'fr') {
        tracks = PL_FR.map(mkFR);
    } else if (mode === 'sq') {
        tracks = PL_SQ.map(mkSQ);
    } else {
        tracks = [];
        if (PL_PAIRS?.length) {
            // Use manually-confirmed pairs from config.html
            for (const p of PL_PAIRS) {
                if (p.fr) tracks.push(mkFR(p.fr));
                if (p.sq) tracks.push(mkSQ(p.sq));
            }
            // SQ files not in any pair
            const usedSQ = new Set(PL_PAIRS.map(p=>p.sq).filter(Boolean));
            for (const f of PL_SQ) if (!usedSQ.has(f)) tracks.push(mkSQ(f));
        } else {
            // Fallback: interleave by index
            const len = Math.max(PL_FR.length, PL_SQ.length);
            for (let i=0; i<len; i++) {
                if (i < PL_FR.length) tracks.push(mkFR(PL_FR[i]));
                if (i < PL_SQ.length) tracks.push(mkSQ(PL_SQ[i]));
            }
        }
    }
}

function trackKey(i) { return tracks[i].dir + tracks[i].file; }
function cleanName(f) { return f.replace(/^\d+[-‐.]\d*\s*/,'').replace(/\.mp3$/i,'').trim(); }
function getTitle(i)  { return metaDb[trackKey(i)]?.title  || cleanName(tracks[i].file); }
function getArtist(i) { return metaDb[trackKey(i)]?.artist || CFG.radioArtist; }
function getLangFlag(i) { return tracks[i]?.lang === 'fr' ? '🇫🇷' : '🇦🇱'; }

// ══════════════════ META LOADING ══════════════════════════════════════════
const mQueue = []; let mBusy = false;
function loadMeta(idx, cb) {
    const key = trackKey(idx);
    if (metaDb[key]) { cb&&cb(metaDb[key]); return; }
    const t = tracks[idx];
    xget(t.dir + encodeURIComponent(t.file), 'arraybuffer', buf => {
        metaDb[key]=parseId3(buf); cb&&cb(metaDb[key]);
    }, () => { metaDb[key]={}; cb&&cb({}); });
}
function queueAll() {
    for (let i=0; i<tracks.length; i++) if (!metaDb[trackKey(i)]) mQueue.push(i);
    pump();
}
function pump() {
    while (mQueue.length) {
        const idx=mQueue.shift();
        if (!tracks[idx]) continue;
        if (metaDb[trackKey(idx)]) { updateItem(idx); continue; }
        mBusy=true;
        loadMeta(idx, () => { updateItem(idx); if(idx===curIdx) refreshPlayer(); mBusy=false; setTimeout(pump,0); });
        return;
    }
    mBusy=false;
}

// ══════════════════ DYNAMIC BG COLOR ══════════════════════════════════════
const _cvs = document.createElement('canvas');
const _ctx = _cvs.getContext('2d', { willReadFrequently: true });
function extractBgColor(imgEl, cb) {
    _cvs.width = _cvs.height = 40;
    try {
        _ctx.drawImage(imgEl, 0, 0, 40, 40);
        const d = _ctx.getImageData(0, 0, 40, 40).data;
        let r=0,g=0,b=0,n=0;
        for (let i=0;i<d.length;i+=16){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
        r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n);
        cb(Math.round(r*.45), Math.round(g*.45), Math.round(b*.45));
    } catch { cb(74,32,32); }
}
function applyBgColor(r,g,b) {
    const grad = `linear-gradient(160deg,rgb(${r},${g},${b}) 0%,rgb(${Math.round(r*.6)},${Math.round(g*.6)},${Math.round(b*.6)}) 25%,rgb(${Math.round(r*.35)},${Math.round(g*.35)},${Math.round(b*.35)}) 45%,var(--black) 68%)`;
    playerBg.style.background = grad;
}

function setCovers(src) {
    [artwork, plCover, lyrMiniArt].forEach(el => {
        el.src = src;
        if (!isJingle) el.onload = () => extractBgColor(el, applyBgColor);
    });
}

function applyArtState() {
    if (isJingle) return;
    if (artState === 0) {
        setCovers(COVER);
    } else {
        const src = metaDb[trackKey(curIdx)]?.coverUrl || COVER;
        setCovers(src);
    }
    artwork.classList.toggle('locked', artState === 1);
}
function refreshPlayer() {
    if (isJingle) return;
    tTitle.textContent  = getTitle(curIdx);
    tArtist.textContent = getArtist(curIdx);
    langBadge.textContent = getLangFlag(curIdx);
    lyrTitle.textContent  = getTitle(curIdx);
    lyrArtist.textContent = getArtist(curIdx);
    applyArtState();
}
function refreshBtn() {
    const ic = isPlaying ? 'fa-pause' : 'fa-play';
    playIcon.className  = 'fa-solid ' + ic;
    lyrPlIcon.className = 'fa-solid ' + ic;
}

// ══════════════════ PLAYER CORE ═══════════════════════════════════════════
function loadTrack(idx, play=false) {
    curIdx   = idx;
    isJingle = false; curJingleFile = null;
    artState = 0;  // retour à la cover radio sur chaque nouvelle piste
    const t  = tracks[idx];
    audio.src = t.dir + encodeURIComponent(t.file);
    tTitle.innerHTML    = '<span class="spin"></span>';
    tArtist.textContent = CFG.radioArtist;
    langBadge.textContent = '';
    lyrTitle.textContent = lyrArtist.textContent = '';
    artwork.classList.remove('locked');
    setCovers(COVER);
    resetProgress();
    playerBg.style.background = '';
    lyricsData=[]; lyricsSync=false; curLyrLine=-1; updateLyrBtn();
    highlightList();

    if (metaDb[trackKey(idx)]) refreshPlayer();
    else loadMeta(idx, ()=>refreshPlayer());

    tryLoadLrc(idx);
    refreshCacheBtn();

    if (play) {
        audio.play().then(()=>{ isPlaying=true; refreshBtn(); artwork.classList.add('pulse'); }).catch(()=>{});
    }
}

function togglePlay() {
    if (isPlaying) {
        audio.pause(); isPlaying=false; artwork.classList.remove('pulse'); refreshBtn();
    } else {
        audio.play().then(()=>{ isPlaying=true; artwork.classList.add('pulse'); refreshBtn(); }).catch(()=>{});
    }
}

function buildShuffle() {
    shuf=[...Array(tracks.length).keys()];
    for (let i=shuf.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [shuf[i],shuf[j]]=[shuf[j],shuf[i]]; }
}
function getAdj(dir) {
    if (isShuffle) { const p=shuf.indexOf(curIdx); return shuf[(p+dir+shuf.length)%shuf.length]; }
    return (curIdx+dir+tracks.length)%tracks.length;
}
function nextTrack() {
    if (isJingle) { isJingle=false; curJingleFile=null; loadTrack(getAdj(+1), isPlaying); return; }
    jingleCtr++;
    if (JINGLES.length && jingleCtr>=nextJingle) {
        jingleCtr=0; nextJingle=rng(CFG.jingleEveryMin, CFG.jingleEveryMax);
        playJingle();
    } else {
        loadTrack(getAdj(+1), isPlaying);
    }
}
function prevTrack() {
    if (audio.currentTime>3) { audio.currentTime=0; return; }
    if (isJingle) { isJingle=false; curJingleFile=null; }
    loadTrack(getAdj(-1), isPlaying);
}

function resetProgress() {
    pFill.style.width='0%'; pThumb.style.left='0%';
    tCur.textContent='0:00'; tTot.textContent='0:00';
}
const fmt = s => isFinite(s) ? `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}` : '0:00';

audio.addEventListener('timeupdate', () => {
    const pct = audio.duration ? audio.currentTime/audio.duration*100 : 0;
    pFill.style.width=pct+'%'; pThumb.style.left=pct+'%';
    tCur.textContent=fmt(audio.currentTime); tTot.textContent=fmt(audio.duration);
    syncLyrics(audio.currentTime);
});
audio.addEventListener('ended', () => {
    artwork.classList.remove('pulse');
    isPlaying=false; refreshBtn();
    if (isRepeat) { audio.currentTime=0; audio.play(); return; }
    if (isJingle) { isJingle=false; curJingleFile=null; loadTrack(getAdj(+1), true); return; }
    jingleCtr++;
    if (JINGLES.length && jingleCtr>=nextJingle) {
        jingleCtr=0; nextJingle=rng(CFG.jingleEveryMin, CFG.jingleEveryMax);
        playJingle();
    } else {
        loadTrack(getAdj(+1), true);
    }
});

function seek(e) {
    const r=pHit.getBoundingClientRect(), x=(e.touches?.[0]||e).clientX;
    if (isFinite(audio.duration)) audio.currentTime=Math.max(0,Math.min(1,(x-r.left)/r.width))*audio.duration;
}
pHit.addEventListener('click', seek);
pHit.addEventListener('touchstart', e=>{e.preventDefault();seek(e);},{passive:false});
pHit.addEventListener('touchmove',  e=>{e.preventDefault();seek(e);},{passive:false});

// ══════════════════ JINGLES ═══════════════════════════════════════════════
function prepJingle() {
    if (!JINGLES.length) { loadTrack(0); return; }
    const j = JINGLES[Math.floor(Math.random()*JINGLES.length)];
    isJingle=true; curJingleFile=j;
    audio.src = JINGLE_D + encodeURIComponent(j);
    tTitle.textContent  = CFG.radioName;
    tArtist.textContent = CFG.radioArtist;
    langBadge.textContent = '📻';
    lyrTitle.textContent = lyrArtist.textContent = '';
    setCovers(COVER);
    playerBg.style.background = 'linear-gradient(160deg,#1a2a4a 0%,#0f1a2a 25%,#0a1015 45%,var(--black) 68%)';
    lyricsData=[]; updateLyrBtn();
    highlightList();
}
function playJingle(forced=null) {
    if (!JINGLES.length) { nextTrack(); return; }
    const j = forced ?? JINGLES[Math.floor(Math.random()*JINGLES.length)];
    isJingle=true; curJingleFile=j;
    audio.src = JINGLE_D + encodeURIComponent(j);
    tTitle.textContent  = CFG.radioName;
    tArtist.textContent = CFG.radioArtist;
    langBadge.textContent = '📻';
    lyrTitle.textContent = lyrArtist.textContent = '';
    setCovers(COVER);
    playerBg.style.background = 'linear-gradient(160deg,#1a2a4a 0%,#0f1a2a 25%,#0a1015 45%,var(--black) 68%)';
    lyricsData=[]; updateLyrBtn();
    if (lyrOpen) closeLyrics();
    resetProgress();
    highlightList();
    audio.play().then(()=>{ isPlaying=true; refreshBtn(); artwork.classList.add('pulse'); }).catch(()=>{});
}

// ══════════════════ CYCLE POCHETTE → MP3 ════════════════════════════════
artwork.addEventListener('click', () => {
    if (isJingle) return;
    artState = artState === 0 ? 1 : 0;
    if (artState === 0) {
        setCovers(COVER);
        artwork.classList.remove('locked');
    } else {
        const src = metaDb[trackKey(curIdx)]?.coverUrl || COVER;
        setCovers(src);
        artwork.classList.add('locked');
    }
});

// ══════════════════ LRC LYRICS ════════════════════════════════════════════
function tryLoadLrc(idx) {
    const t    = tracks[idx];
    const name = t.file.replace(/\.mp3$/i, '');
    const url  = t.dir + encodeURIComponent(name + t.lrcSuffix);
    fetch(url)
        .then(r => r.ok ? r.text() : Promise.reject())
        .then(txt => {
            const parsed = parseLrc(txt);
            if (parsed.length) {
                lyricsData = parsed; lyricsSync = true;
            } else {
                // LRC file exists but no timestamps — show as plain text
                lyricsData = plainLyrics(txt); lyricsSync = false;
            }
            updateLyrBtn(); if (lyrOpen) renderLyrics();
        })
        .catch(() => useLyrFallback(idx));
}
function useLyrFallback(idx) {
    // Fallback : paroles embarquées dans l'ID3 (frame USLT)
    const key = trackKey(idx);
    const emb = metaDb[key]?.lyrics;
    if (emb) {
        lyricsData = plainLyrics(emb); lyricsSync = false;
    } else if (!metaDb[key]) {
        // Meta pas encore chargée → réessayer quand elle arrive
        loadMeta(idx, ()=>useLyrFallback(idx));
        return;
    } else {
        lyricsData = []; lyricsSync = false;
    }
    updateLyrBtn(); if (lyrOpen) renderLyrics();
}
function plainLyrics(txt) {
    return txt.split(/\r?\n/)
        .map(l=>l.replace(/^\[.*?\]/g,'').trim())  // strip any LRC tags
        .filter(l=>l)
        .map(tx=>({ t:-1, tx }));  // t=-1 = pas de timestamp
}
function parseLrc(txt) {
    const rx=/\[(\d{1,2}):(\d{2}(?:\.\d+)?)\](.*)/;
    return txt.split('\n')
        .map(l=>{ const m=rx.exec(l); return m?{t:+m[1]*60 + +m[2], tx:m[3].trim()}:null; })
        .filter(l=>l&&l.tx).sort((a,b)=>a.t-b.t);
}
function updateLyrBtn() {
    const btn=document.getElementById('btn-lyrics');
    const has=lyricsData.length>0;
    btn.classList.toggle('dim', !has);
    btn.style.pointerEvents = has ? 'auto' : 'none';
}
function renderLyrics() {
    curLyrLine=-1;
    if (!lyricsData.length) {
        lyrLines.innerHTML='<div class="lyr-empty">Pas de paroles disponibles</div>';
        return;
    }
    if (!lyricsSync) {
        // Plain text — toutes les lignes visibles d'un coup
        lyrLines.innerHTML = lyricsData.map(l=>
            `<div class="lyr-line" style="color:rgba(255,255,255,.85);font-size:22px">${esc(l.tx)}</div>`
        ).join('');
    } else {
        lyrLines.innerHTML = lyricsData.map((l,i)=>
            `<div class="lyr-line" data-i="${i}">${esc(l.tx)}</div>`
        ).join('');
    }
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function syncLyrics(t) {
    if (!lyricsData.length||!lyrOpen||!lyricsSync) return;  // plain text = pas de sync
    let idx=-1;
    for (let i=0;i<lyricsData.length;i++) { if(lyricsData[i].t<=t) idx=i; else break; }
    if (idx===curLyrLine) return;
    curLyrLine=idx;
    lyrLines.querySelectorAll('.lyr-line').forEach((el,i) => {
        el.className='lyr-line'+(i===idx?' now':i<idx?' past':'');
    });
    if (idx>=0) lyrLines.querySelectorAll('.lyr-line')[idx]?.scrollIntoView({behavior:'smooth',block:'center'});
}
function openLyrics() {
    if (!lyricsData.length) return;
    lyrOpen=true; document.body.classList.add('lyr-open');
    renderLyrics(); syncLyrics(audio.currentTime);
}
function closeLyrics() {
    lyrOpen=false; document.body.classList.remove('lyr-open');
}

// ══════════════════ TRACK LIST ════════════════════════════════════════════
function buildList() {
    tList.innerHTML='';
    plCount.textContent = tracks.length + ' titres · ' + JINGLES.length + ' jingle';

    tracks.forEach((t,i)=>{
        const d=document.createElement('div');
        d.className='titem'; d.dataset.kind='music'; d.dataset.idx=i;
        renderMusicItem(i,d);
        d.addEventListener('click',()=>{ loadTrack(i,true); closePl(); });
        tList.appendChild(d);
    });

    if (JINGLES.length) {
        const sep=document.createElement('div');
        sep.className='pl-section'; sep.textContent='Jingles Radio';
        tList.appendChild(sep);
        JINGLES.forEach((f,i)=>{
            const d=document.createElement('div');
            d.className='titem'; d.dataset.kind='jingle'; d.dataset.idx=i;
            renderJingleItem(f,d);
            d.addEventListener('click',()=>{ playJingle(f); closePl(); });
            tList.appendChild(d);
        });
    }
}
function renderMusicItem(i, el) {
    const d=el||tList.querySelector(`[data-kind="music"][data-idx="${i}"]`); if(!d)return;
    const now=(i===curIdx&&!isJingle);
    const flag = tracks[i]?.lang==='fr' ? '🇫🇷' : '🇦🇱';
    const cached = !!cacheMap[trackUrl(i)];
    const cacheIcoClass = cached ? 'fa-solid fa-circle-check' : 'fa-solid fa-circle-arrow-down';
    const cacheColor    = cached ? 'var(--green)' : 'var(--mid)';
    const cacheOpacity  = cached ? '1' : '0.4';
    d.innerHTML=
        `<div class="tnum${now?' now':''}">${now?'<i class="fa-solid fa-volume-high"></i>':i+1}</div>
         <div class="tiinfo">
           <div class="tittl${now?' now':''}">${esc(getTitle(i))}</div>
           <div class="tartst">${esc(getArtist(i))}</div>
         </div>
         <span class="titem-flag">${flag}</span>
         <span class="titem-cache"><i class="${cacheIcoClass}" style="color:${cacheColor};opacity:${cacheOpacity}"></i></span>`;
}
function renderJingleItem(f, el) {
    const jIdx=JINGLES.indexOf(f);
    const d=el||tList.querySelector(`[data-kind="jingle"][data-idx="${jIdx}"]`); if(!d)return;
    const now=(isJingle&&curJingleFile===f);
    d.innerHTML=
        `<div class="tnum${now?' now':''}">
           ${now?'<i class="fa-solid fa-volume-high"></i>':'<i class="fa-solid fa-radio" style="font-size:13px;color:var(--mid)"></i>'}
         </div>
         <div class="tiinfo">
           <div class="tittl${now?' now':''}">${esc(f.replace(/\.mp3$/i,''))}</div>
           <div class="tartst">${esc(CFG.radioName)}</div>
         </div>
         <span class="titem-flag">📻</span>`;
}
function updateItem(i) { renderMusicItem(i); }
function highlightList() {
    tList.querySelectorAll('[data-kind="music"]').forEach(el=>renderMusicItem(+el.dataset.idx,el));
    tList.querySelectorAll('[data-kind="jingle"]').forEach(el=>renderJingleItem(JINGLES[+el.dataset.idx],el));
}

// ══════════════════ MODE SWITCHING ════════════════════════════════════════
function setMode(m) {
    mode=m;
    document.getElementById('m-fr')  .classList.toggle('active', m==='fr');
    document.getElementById('m-both').classList.toggle('active', m==='both');
    document.getElementById('m-sq')  .classList.toggle('active', m==='sq');
    buildTracks();
    buildShuffle();
    refreshCacheMap().then(()=>{ buildList(); });
    if (tracks.length) {
        if (JINGLES.length) prepJingle();
        else loadTrack(0);
    }
}
document.getElementById('m-fr')  .addEventListener('click', ()=>setMode('fr'));
document.getElementById('m-both').addEventListener('click', ()=>setMode('both'));
document.getElementById('m-sq')  .addEventListener('click', ()=>setMode('sq'));

// ══════════════════ VIEW SWITCHING ════════════════════════════════════════
function openPl() {
    document.body.classList.add('pl-open');
    queueAll();
    setTimeout(()=>tList.querySelector('[data-kind="music"].titem:nth-child('+Math.max(1,curIdx+1)+')')?.scrollIntoView({behavior:'smooth',block:'center'}),400);
}
function closePl() { document.body.classList.remove('pl-open'); }

let sx=0, sy=0;
document.getElementById('vpl').addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; },{passive:true});
document.getElementById('vpl').addEventListener('touchend',e=>{
    const dx=e.changedTouches[0].clientX-sx, dy=Math.abs(e.changedTouches[0].clientY-sy);
    if (dx>80 && dx>dy*2) closePl();  // swipe droit clairement horizontal
},{passive:true});

// ══════════════════ BINDINGS ══════════════════════════════════════════════
document.getElementById('btn-play')    .addEventListener('click', togglePlay);
document.getElementById('btn-next')    .addEventListener('click', nextTrack);
document.getElementById('btn-prev')    .addEventListener('click', prevTrack);
document.getElementById('btn-open-pl') .addEventListener('click', openPl);
document.getElementById('btn-close-pl').addEventListener('click', closePl);
document.getElementById('btn-lyrics')    .addEventListener('click', openLyrics);
document.getElementById('btn-cache-cur') .addEventListener('click', cacheCurrentTrack);
document.getElementById('btn-cache-all') .addEventListener('click', async () => {
    const ico = document.getElementById('cache-all-icon');
    ico.className = 'fa-solid fa-spinner fa-spin';
    // Mettre en cache tous les morceaux visibles (selon le mode courant)
    for (let i=0; i<tracks.length; i++) await cacheOneTrack(i);
    await refreshCacheMap();
    updateCacheIcons();
    ico.className = 'fa-solid fa-cloud-check';
    document.getElementById('btn-cache-all').style.color = 'var(--green)';
});
document.getElementById('btn-close-lyr').addEventListener('click', closeLyrics);
document.getElementById('lyr-play').addEventListener('click', togglePlay);
document.getElementById('lyr-prev').addEventListener('click', prevTrack);
document.getElementById('lyr-next').addEventListener('click', nextTrack);

document.getElementById('btn-pl-play').addEventListener('click',()=>{
    isShuffle=false; document.getElementById('btn-shuffle').classList.remove('active');
    loadTrack(0,true); closePl();
});
document.getElementById('btn-pl-shuffle').addEventListener('click',()=>{
    isShuffle=true; document.getElementById('btn-shuffle').classList.add('active');
    buildShuffle(); loadTrack(shuf[0],true); closePl();
});
document.getElementById('btn-shuffle').addEventListener('click',()=>{
    isShuffle=!isShuffle;
    document.getElementById('btn-shuffle').classList.toggle('active',isShuffle);
    if (isShuffle) buildShuffle();
});
document.getElementById('btn-repeat').addEventListener('click',()=>{
    isRepeat=!isRepeat;
    document.getElementById('btn-repeat').classList.toggle('active',isRepeat);
});

// ══════════════════ SERVICE WORKER ════════════════════════════════════════
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(reg => {
        // Barre de progression pendant le cache-all via SW
        navigator.serviceWorker.addEventListener('message', e => {
            if (e.data?.type === 'PRECACHE_PROGRESS') {
                const pct = e.data.done / e.data.total * 100;
                const bar = document.getElementById('cache-bar');
                bar.classList.add('show');
                document.getElementById('cache-bar-lbl').textContent = `Mise en cache… (${e.data.done}/${e.data.total})`;
                document.getElementById('cache-fill').style.width = pct + '%';
                document.getElementById('cache-bar-pct').textContent = Math.round(pct) + '%';
            } else if (e.data?.type === 'PRECACHE_DONE') {
                document.getElementById('cache-bar-lbl').textContent = 'Disponible hors-ligne ✓';
                document.getElementById('cache-fill').style.width = '100%';
                document.getElementById('cache-bar-pct').textContent = '100%';
                setTimeout(()=>document.getElementById('cache-bar').classList.remove('show'), 2000);
                refreshCacheMap().then(updateCacheIcons);
            }
        });
    }).catch(()=>{});
}

// ══════════════════ CLOCK ═════════════════════════════════════════════════
const clk=document.getElementById('sbar-time');
const tick=()=>{ const d=new Date(); clk.textContent=d.getHours()+':'+String(d.getMinutes()).padStart(2,'0'); };
tick(); setInterval(tick,15000);

// ══════════════════ INIT ══════════════════════════════════════════════════
if (PL_FR.length || PL_SQ.length) {
    buildTracks();
    buildShuffle();
    refreshCacheMap().then(()=>buildList());
    if (JINGLES.length) prepJingle();
    else loadTrack(0);
} else {
    tTitle.textContent  = 'config.html → playlist.js → F5';
    tArtist.textContent = CFG.radioName;
}
</script>
