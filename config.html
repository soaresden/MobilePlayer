<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlbaFrancia FM — Config</title>
    <script src="playlist.js"></script>
    <script src="jingles.js"></script>
    <style>
        * { box-sizing:border-box; margin:0; padding:0; }
        body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
            background:#0d0d0d; color:#e0e0e0; padding:24px 16px 80px; }
        h1   { font-size:20px; font-weight:700; margin-bottom:4px; }
        .sub { font-size:13px; color:#555; margin-bottom:20px; }
        code { background:#1e1e1e; padding:1px 5px; border-radius:4px; font-size:12px; color:#aaa; }

        /* CARDS */
        .cards { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:20px; }
        .card  { background:#1a1a1a; border-radius:10px; padding:12px; text-align:center; }
        .card-n  { font-size:28px; font-weight:700; }
        .c-fr { color:#4488ff; } .c-sq { color:#e84040; } .c-j { color:#1DB954; }
        .card-lbl { font-size:11px; color:#555; margin-top:2px; text-transform:uppercase; letter-spacing:1px; }

        /* ACTIONS */
        .actions { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
        .btn { border:none; border-radius:8px; padding:10px 18px; font-size:13px; font-weight:600;
            cursor:pointer; display:flex; align-items:center; gap:7px; transition:opacity .15s; }
        .btn:hover { opacity:.85; } .btn:active { opacity:.65; }
        .btn-green  { background:#1DB954; color:#000; }
        .btn-grey   { background:#2a2a2a; color:#ccc; }
        .btn-danger { background:#c0392b; color:#fff; }
        #save-status { font-size:12px; color:#555; align-self:center; }

        /* TABLE */
        .tbl-wrap { background:#1a1a1a; border-radius:10px; overflow:hidden; margin-bottom:20px; }
        .tbl-head { display:grid; grid-template-columns:36px 1fr 1fr 90px;
            background:#222; padding:9px 14px; font-size:11px; font-weight:600;
            color:#555; text-transform:uppercase; letter-spacing:1px; }
        .tbl-row  { display:grid; grid-template-columns:36px 1fr 1fr 90px;
            padding:7px 14px; border-top:1px solid #111; align-items:center; }
        .tbl-row:hover { background:#1e1e1e; }
        .tbl-num  { color:#444; text-align:center; font-size:13px; }
        .tbl-name { font-size:12px; color:#bbb; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 6px; }
        .tbl-sel  { padding:0 6px; }

        select { background:#2a2a2a; border:1px solid #333; color:#ddd; border-radius:6px;
            padding:5px 8px; font-size:12px; width:100%; cursor:pointer; }
        select:focus { outline:2px solid #1DB954; outline-offset:1px; border-color:transparent; }
        option { background:#2a2a2a; }

        .badge { display:inline-block; padding:2px 8px; border-radius:10px; font-size:11px; font-weight:600; }
        .b-ok   { background:#1a3a24; color:#1DB954; }
        .b-non  { background:#2a1a1a; color:#c0392b; }
        .b-only { background:#1a2a3a; color:#5599ff; }

        /* ORPHANS */
        .orphan-title { font-size:11px; font-weight:700; color:#555; text-transform:uppercase;
            letter-spacing:1px; margin:16px 0 8px; }
        .orphan-list { background:#1a1a1a; border-radius:10px; overflow:hidden; }
        .orphan-item { display:flex; align-items:center; gap:10px; padding:8px 14px;
            border-bottom:1px solid #111; font-size:12px; color:#888; }
        .orphan-item:last-child { border-bottom:none; }

        /* TOAST */
        .toast { position:fixed; bottom:20px; left:50%; transform:translateX(-50%) translateY(10px);
            background:#1DB954; color:#000; font-weight:600; padding:10px 20px; border-radius:8px;
            font-size:13px; opacity:0; transition:all .25s; pointer-events:none; }
        .toast.err { background:#c0392b; color:#fff; }
        .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<h1>🇦🇱🇫🇷 AlbaFrancia FM — Config</h1>
<p class="sub">Associez chaque chanson française avec sa reprise albanaise · <code>generate_playlist.bat</code> puis <code>start.bat</code></p>

<div class="cards">
    <div class="card"><div class="card-n c-fr" id="n-fr">0</div><div class="card-lbl">🇫🇷 Français</div></div>
    <div class="card"><div class="card-n c-sq" id="n-sq">0</div><div class="card-lbl">🇦🇱 Albanais</div></div>
    <div class="card"><div class="card-n c-j"  id="n-jg">0</div><div class="card-lbl">📻 Jingles</div></div>
</div>

<div class="actions">
    <button class="btn btn-green" id="btn-save">💾 Enregistrer playlist.js</button>
    <button class="btn btn-grey"  id="btn-auto">🔗 Auto-détecter</button>
    <button class="btn btn-grey"  id="btn-clear">✕ Effacer</button>
    <span id="save-status"></span>
</div>

<div class="tbl-wrap">
    <div class="tbl-head">
        <div>#</div>
        <div>🇫🇷 Chanson française</div>
        <div>🇦🇱 Reprise albanaise</div>
        <div style="text-align:center">Statut</div>
    </div>
    <div id="tbl-body"></div>
</div>

<div id="orphan-section" style="display:none">
    <div class="orphan-title">🇦🇱 Reprises sans original français</div>
    <div class="orphan-list" id="orphan-list"></div>
</div>

<div class="toast" id="toast"></div>

<script>
const FR     = window.PLAYLIST_FR    || [];
const SQ     = window.PLAYLIST_SQ    || [];
const JG     = window.JINGLES        || [];
// ── Auto-match by name similarity ────────────────────────────────────────
function cleanForMatch(s) {
    return s
        .replace(/\.mp3$/i, '')
        .replace(/^\d+[-\s.–—]+\d*\s*/,'')   // strip track numbers
        .toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g,'')  // remove accents
        .replace(/[^a-z0-9]/g,'');             // keep only alphanum
}
function similarity(a, b) {
    if (!a||!b) return 0;
    if (a===b) return 1;
    if (a.includes(b)||b.includes(a)) return 0.85;
    // simple Levenshtein ratio
    const m=a.length, n=b.length;
    const dp=Array.from({length:m+1},(_,i)=>Array.from({length:n+1},(_,j)=>i||j?Infinity:0));
    for(let i=0;i<=m;i++) dp[i][0]=i;
    for(let j=0;j<=n;j++) dp[0][j]=j;
    for(let i=1;i<=m;i++) for(let j=1;j<=n;j++)
        dp[i][j]=a[i-1]===b[j-1]?dp[i-1][j-1]:1+Math.min(dp[i-1][j],dp[i][j-1],dp[i-1][j-1]);
    return 1 - dp[m][n]/Math.max(m,n);
}
function autoMatch() {
    const sqClean = SQ.map(cleanForMatch);
    const used = new Set();
    return FR.map(f => {
        const fc = cleanForMatch(f);
        let best=-1, bestScore=0;
        sqClean.forEach((sc,i)=>{ if(!used.has(i)){ const s=similarity(fc,sc); if(s>bestScore){bestScore=s;best=i;}}});
        if (bestScore >= 0.45 && best>=0) { used.add(best); return {fr:f, sq:SQ[best], auto:true, score:bestScore}; }
        return {fr:f, sq:null, auto:false, score:0};
    });
}

// Load from saved PLAYLIST_PAIRS or auto-match
let pairs = window.PLAYLIST_PAIRS
    ? window.PLAYLIST_PAIRS.map(p=>({...p, auto:false}))
    : autoMatch();

// Sync if FR grew
for (let i=pairs.length; i<FR.length; i++) pairs.push({fr:FR[i], sq:null, auto:false});

document.getElementById('n-fr').textContent = FR.length;
document.getElementById('n-sq').textContent = SQ.length;
document.getElementById('n-jg').textContent = JG.length;

function assignedSQ() { return new Set(pairs.map(p=>p.sq).filter(Boolean)); }

function render() {
    const body = document.getElementById('tbl-body');
    const used = assignedSQ();

    body.innerHTML = FR.map((f, i) => {
        const p   = pairs[i] || {fr:f, sq:null};
        const sel = p.sq || '';
        const opts = ['<option value="">— aucune —</option>',
            ...SQ.map(s => `<option value="${esc(s)}"${s===sel?' selected':''}>${esc(s)}</option>`)
        ].join('');

        let badge;
        if (!sel) {
            badge = `<span class="badge b-non">— Seul</span>`;
        } else if (p.auto && p.score < 0.75) {
            badge = `<span class="badge" style="background:#3a2e10;color:#f0a000" title="Correspondance incertaine (${Math.round(p.score*100)}%)">? Auto</span>`;
        } else if (p.auto) {
            badge = `<span class="badge b-ok" title="Auto-détecté (${Math.round(p.score*100)}%)">✓ Auto</span>`;
        } else {
            badge = `<span class="badge b-ok">✓ Manuel</span>`;
        }

        return `<div class="tbl-row">
            <div class="tbl-num">${i+1}</div>
            <div class="tbl-name" title="${esc(f)}">${esc(f)}</div>
            <div class="tbl-sel"><select data-idx="${i}" onchange="onPair(this)">${opts}</select></div>
            <div style="text-align:center">${badge}</div>
        </div>`;
    }).join('');

    // Orphans
    const orphans = SQ.filter(s => !used.has(s));
    const sec = document.getElementById('orphan-section');
    const lst = document.getElementById('orphan-list');
    if (orphans.length) {
        sec.style.display='block';
        lst.innerHTML = orphans.map(s =>
            `<div class="orphan-item">🇦🇱 ${esc(s)} <span style="color:#c0392b;margin-left:4px">non assignée</span></div>`
        ).join('');
    } else { sec.style.display='none'; }

    updateStatus();
}

function onPair(sel) {
    const idx = +sel.dataset.idx;
    const val = sel.value || null;

    // Remove this SQ from any other pair that had it
    if (val) pairs.forEach((p,i) => { if (i!==idx && p.sq===val) p.sq=null; });

    pairs[idx].sq = val;
    render();
}

function updateStatus() {
    const paired = pairs.filter(p=>p.sq).length;
    document.getElementById('save-status').textContent =
        `${paired}/${FR.length} associé${paired>1?'s':''} · ${SQ.length-paired} reprise${SQ.length-paired>1?'s':''} non assignée${SQ.length-paired>1?'s':''}`;
}

function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ── Save ─────────────────────────────────────────────────────────────────
async function save() {
    // Build the content: preserve PLAYLIST_FR, PLAYLIST_SQ, add PLAYLIST_PAIRS
    const pairsClean = pairs.map(p=>({fr:p.fr, sq:p.sq||null}));

    const content =
`// Généré par config.html — ${new Date().toLocaleString('fr-FR')}
window.PLAYLIST_FR = ${JSON.stringify(FR, null, 2)};

window.PLAYLIST_SQ = ${JSON.stringify(SQ, null, 2)};

// Associations manuelles FR ↔ AL (éditez via config.html)
window.PLAYLIST_PAIRS = ${JSON.stringify(pairsClean, null, 2)};
`;

    if ('showSaveFilePicker' in window) {
        try {
            const h = await showSaveFilePicker({
                suggestedName: 'playlist.js',
                types:[{description:'JavaScript',accept:{'text/javascript':['.js']}}],
            });
            const w = await h.createWritable();
            await w.write(content);
            await w.close();
            toast('playlist.js enregistré ✓');
            return;
        } catch(e) { if (e.name==='AbortError') return; }
    }

    // Fallback download
    const a = document.createElement('a');
    a.href = 'data:text/javascript;charset=utf-8,' + encodeURIComponent(content);
    a.download = 'playlist.js';
    a.click();
    toast('Téléchargé — remplacez playlist.js à la racine');
}

document.getElementById('btn-save').addEventListener('click', save);
document.getElementById('btn-auto').addEventListener('click', () => {
    pairs = autoMatch();
    render();
    const n = pairs.filter(p=>p.sq).length;
    toast(`Auto-détection : ${n} correspondance${n>1?'s':''} trouvée${n>1?'s':''}`);
});
document.getElementById('btn-clear').addEventListener('click', () => {
    pairs.forEach(p => { p.sq=null; p.auto=false; });
    render();
    toast('Associations effacées', true);
});

function toast(msg, err=false) {
    const t=document.getElementById('toast');
    t.textContent=msg; t.className='toast'+(err?' err':'');
    t.classList.add('show');
    setTimeout(()=>t.classList.remove('show'), 3000);
}

// Check if playlist.js was loaded correctly
if (!FR.length && !SQ.length) {
    document.getElementById('tbl-body').innerHTML =
        '<div style="padding:20px;color:#555;text-align:center">Aucun fichier — lancez <strong>generate_playlist.bat</strong> puis rechargez cette page</div>';
} else {
    render();
}
</script>
</body>
</html>
