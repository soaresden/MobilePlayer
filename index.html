<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Spotify</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="config.js"></script>
    <script src="playlist.js"></script>
    <script src="jingles.js"></script>
    <style>
        :root { --green:#1DB954; --black:#121212; --dark:#181818; --grey:#282828; --mid:#535353; --light:#b3b3b3; --s:1; }
        * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none; }
        html,body { height:100%; background:#0d0d0d;
            font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; color:#fff; }
        body { display:flex; align-items:center; justify-content:center; overflow:hidden; }

        /* ── Layout responsive (mobile + PC, plein écran) ── */
        html,body { height:100%; overflow:hidden; background:var(--black); }
        body { overflow:hidden; }
        #phone {
            position:relative; width:100%; height:100%;
            overflow:hidden; flex-shrink:0; background:var(--black);
        }

        /* STATUS BAR */
        .sbar { position:absolute; top:0; left:0; right:0; height:44px; display:flex; align-items:center;
            justify-content:space-between; padding:0 22px; z-index:300; pointer-events:none; }
        .sbar-time { font-size:calc(14px * var(--s)); font-weight:700; }
        .sbar-icons { display:flex; align-items:center; gap:6px; font-size:calc(13px * var(--s)); }

        /* VIEWS */
        .view { position:absolute; inset:0; display:flex; flex-direction:column; background:var(--black);
            overflow:hidden; transition:transform .38s cubic-bezier(.4,0,.2,1); will-change:transform; }
        /* Player : centrer .pc horizontalement */
        #vp   { transform:translateX(0); z-index:1; align-items:center; }
        /* Lyrics + DL : centrer leur contenu */
        #vlyr { align-items:center; }
        #vdl  { align-items:center; }
        /* Playlist : pleine largeur (pas d'align-items:center) */
        /* visibility:hidden par défaut → évite le leak transform sur certains navigateurs */
        #vpl  { transform:translateX(100%); z-index:2; visibility:hidden;
                transition:transform .38s cubic-bezier(.4,0,.2,1), visibility 0s .38s; }
        #vlyr { transform:translateY(100%); z-index:3; visibility:hidden;
                transition:transform .38s cubic-bezier(.4,0,.2,1), visibility 0s .38s; }
        #vdl  { display:none; z-index:4; background:var(--dark); }
        body.pl-open  #vp  { transform:translateX(-100%); }
        body.pl-open  #vpl { transform:translateX(0); z-index:10; visibility:visible;
                              transition:transform .38s cubic-bezier(.4,0,.2,1), visibility 0s; }
        body.lyr-open #vlyr { transform:translateY(0); visibility:visible;
                               transition:transform .38s cubic-bezier(.4,0,.2,1), visibility 0s; }
        body.dl-open  #vdl  { display:flex; }
        #vp::after { content:''; position:absolute; inset:0; background:rgba(0,0,0,.55);
            opacity:0; transition:opacity .38s; pointer-events:none; z-index:10; }
        body.pl-open #vp::after { opacity:1; }

        /* SHARED */
        .ibtn { background:none; border:none; color:#fff; width:44px; height:44px;
            display:flex; align-items:center; justify-content:center; font-size:calc(20px * var(--s)); cursor:pointer; flex-shrink:0; }
        .dim { color:var(--light) !important; opacity:.5; }

        /* PLAYER BG */
        .pbg { position:absolute; inset:0;
            background:linear-gradient(160deg,#4a2020 0%,#2a1515 25%,#1a1010 45%,var(--black) 68%);
            z-index:0; transition:background 1.2s ease; }
        /* .pc : pleine largeur, padding adaptatif qui grandit avec l'écran */
        .pc { position:relative; z-index:1; display:flex; flex-direction:column; height:100%;
              padding:0 clamp(24px, 8vw, 160px) 28px; width:100%; }

        /* TOP BAR */
        .topbar { display:flex; align-items:center; justify-content:space-between; padding-top:46px; padding-bottom:4px; }
        .topbar-c { text-align:center; flex:1; }
        .topbar-ttl { font-size:calc(14px * var(--s)); font-weight:700; }

        /* ARTWORK */
        .art-wrap { flex:1; display:flex; align-items:center; justify-content:center; padding:6px 0; }
        .art { width:100%; max-width:clamp(200px, min(46vmin,80vw), 400px); aspect-ratio:1; border-radius:8px;
            box-shadow:0 16px 48px rgba(0,0,0,.75); object-fit:cover; background:var(--grey);
            cursor:pointer; transition:transform .2s; }
        .art.pulse  { transform:scale(1.02); }
        .art.locked { outline:2px solid rgba(29,185,84,.35); outline-offset:3px; }

        /* TRACK INFO */
        .tinfo { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
        .ttext { flex:1; overflow:hidden; }
        .ttitle  { font-size:calc(18px * var(--s)); font-weight:700; white-space:nowrap; overflow:hidden; }
        .ttitle span.marquee-inner { display:inline-block; }
        .ttitle.scrolling span.marquee-inner {
            animation: marquee-bounce var(--mq-dur,8s) ease-in-out infinite;
        }
        @keyframes marquee-bounce {
            0%,15%   { transform:translateX(0); }
            45%,55%  { transform:translateX(var(--mq-shift,0px)); }
            85%,100% { transform:translateX(0); }
        }
        .tartist { font-size:calc(13px * var(--s)); color:var(--light); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

        /* PROGRESS */
        .prog-wrap { margin-bottom:20px; }
        .prog-hit  { width:100%; padding:14px 0; margin:-14px 0; cursor:pointer; }
        .prog-rail { height:4px; background:rgba(255,255,255,.18); border-radius:2px; position:relative; }
        .prog-fill { height:100%; width:0%; background:#fff; border-radius:2px; position:absolute; top:0; }
        .prog-hit:active .prog-fill { background:var(--green); }
        .prog-thumb { width:14px; height:14px; background:#fff; border-radius:50%; position:absolute;
            top:50%; left:0%; transform:translate(-50%,-50%); opacity:0; transition:opacity .15s; pointer-events:none; }
        .prog-hit:active .prog-thumb { opacity:1; }
        .prog-times { display:flex; justify-content:space-between; margin-top:6px; font-size:calc(11px * var(--s)); color:var(--light); font-weight:500; }

        /* CONTROLS */
        .ctrls { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
        .cbtn { background:none; border:none; color:#fff; display:flex; align-items:center;
            justify-content:center; cursor:pointer; position:relative; }
        .cbtn.active { color:var(--green); }
        .cbtn.active::after { content:''; position:absolute; bottom:-6px; left:50%;
            transform:translateX(-50%); width:4px; height:4px; background:var(--green); border-radius:50%; }
        .cbtn-skip { font-size:calc(30px * var(--s)); }
        .cbtn-mini { font-size:calc(22px * var(--s)); color:var(--light); }
        .cbtn-play { width:58px; height:58px; background:#fff; color:#000; border-radius:50%;
            font-size:calc(24px * var(--s)); box-shadow:0 4px 14px rgba(0,0,0,.4); transition:transform .1s; }
        .cbtn-play:active { transform:scale(.94); }

        /* BOTTOM BAR */
        .bbar { display:flex; align-items:center; justify-content:center; }
        .bbar .ibtn { color:var(--light); }

        /* TOPBAR icon buttons (smaller than ibtn default) */
        .topbar-actions { display:flex; gap:2px; }
        .topbar-actions .ibtn { width:34px; height:34px; font-size:calc(16px * var(--s)); }

        /* Per-track cache icon */
        .titem-cache { width:34px; text-align:center; font-size:calc(22px * var(--s)); flex-shrink:0; cursor:pointer; padding:4px 0; }
        /* Drag handle */
        .drag-handle { width:32px; text-align:center; font-size:calc(22px * var(--s)); flex-shrink:0;
            color:var(--mid); opacity:.5; cursor:grab; padding:4px 0; touch-action:none; }
        .titem.dragging  { opacity:.35; background:rgba(255,255,255,.04); }
        .titem.drop-top  { border-top:2px solid var(--green); }
        .titem.drop-bot  { border-bottom:2px solid var(--green); }

        /* MINI LYRICS (player view — 3 lignes sous la cover) */
        #mini-lyr { flex-shrink:0; text-align:center; padding:4px 0 10px; cursor:pointer;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            gap:3px; min-height:56px; overflow:hidden; }
        #mini-lyr:not(.has-lyr) { opacity:0; pointer-events:none; }
        .ml-line { font-size:calc(13px * var(--s)); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
            max-width:90%; line-height:1.4; }
        .ml-prev, .ml-next { color:rgba(255,255,255,.28); font-weight:500; }
        .ml-curr { font-size:calc(14px * var(--s)); font-weight:700; animation:rainbow-icon 2s linear infinite; }

        /* DOWNLOAD MANAGER VIEW */
        .dl-hdr { display:flex; align-items:center; padding:54px clamp(8px,5vw,60px) 14px; background:var(--grey); flex-shrink:0; width:100%; }
        .dl-hdr-info { flex:1; padding:0 10px; overflow:hidden; }
        .dl-hdr-ttl { font-size:calc(18px * var(--s)); font-weight:700; }
        .dl-hdr-sub { font-size:calc(13px * var(--s)); color:var(--light); margin-top:2px; }
        .dl-prog-wrap { padding:10px clamp(8px,5vw,60px) 4px; flex-shrink:0; width:100%; }
        #dl-error-log { margin:8px clamp(8px,5vw,60px); padding:10px 12px; background:rgba(220,50,50,.18);
            border:1px solid rgba(220,50,50,.4); border-radius:8px; font-size:calc(18px * var(--s));
            color:#ff8888; word-break:break-all; display:none;
            max-height:200px; overflow-y:auto; -webkit-overflow-scrolling:touch; }
        .dl-prog-rail { height:5px; background:rgba(255,255,255,.12); border-radius:3px; }
        .dl-prog-fill { height:100%; width:0%; background:var(--green); border-radius:3px; transition:width .4s; }
        .dl-prog-lbl  { font-size:calc(13px * var(--s)); color:var(--light); margin-top:5px; }
        .dl-body { flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:40px; width:100%; }
        .dl-body::-webkit-scrollbar { display:none; }
        .dl-section { padding:12px clamp(8px,5vw,60px) 4px; font-size:calc(11px * var(--s)); font-weight:700; color:var(--mid);
            text-transform:uppercase; letter-spacing:1px; border-top:1px solid rgba(255,255,255,.06); }
        .dl-item { display:flex; align-items:center; padding:8px clamp(8px,5vw,60px); gap:10px;
            border-bottom:1px solid rgba(255,255,255,.05); }
        .dl-item-info { flex:1; overflow:hidden; }
        .dl-item-ttl { font-size:calc(14px * var(--s)); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .dl-item-sub { font-size:calc(12px * var(--s)); color:var(--light); margin-top:2px; }
        .dl-item-btn  { width:36px; height:36px; background:none; border:none; font-size:calc(18px * var(--s));
            display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; color:var(--light); }
        .dl-item-btn.cached { color:var(--green); }

        /* PLAYLIST VIEW — pleine largeur, padding adaptatif PC */
        .plhdr { background:linear-gradient(to bottom,#4a2020,#2a1515 50%,#181818);
                 padding:0 max(16px, 6vw); flex-shrink:0; width:100%; }
        .pltop { display:flex; align-items:center; justify-content:space-between;
                 padding-top:max(52px, env(safe-area-inset-top, 52px)); padding-bottom:12px; }
        .pltop-ttl { font-size:calc(22px * var(--s)); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:60%; }
        .plhero { display:flex; flex-direction:column; align-items:center; padding:4px 0 10px; }
        .plcover { width:120px; height:120px; border-radius:6px; object-fit:cover;
            box-shadow:0 10px 36px rgba(0,0,0,.7); background:var(--grey); margin-bottom:20px; }
        .plname  { font-size:calc(26px * var(--s)); font-weight:700; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
        .pldesc  { font-size:calc(18px * var(--s)); color:var(--light); margin-top:4px; text-align:center; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:100%; }
        .plmeta  { font-size:calc(17px * var(--s)); color:var(--mid); margin-top:3px; }
        .plactions { display:flex; align-items:center; justify-content:space-between; padding:8px 0 10px; }
        .plbtns { display:flex; gap:10px; flex:1; }
        .lbtn { flex:1; border:none; border-radius:50px; font-size:calc(22px * var(--s)); font-weight:700; padding:14px 18px;
            cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; white-space:nowrap; }
        .lbtn:active { opacity:.8; }
        .lbtn-outline { background:transparent; color:#fff; border:1.5px solid rgba(255,255,255,.25); }
        .lbtn-green   { background:var(--green); color:#000; }
        .tlist { flex:1; overflow-y:auto; padding:4px max(16px, 6vw) 80px; background:var(--dark);
                 -webkit-overflow-scrolling:touch; width:100%; }
        .tlist::-webkit-scrollbar { display:none; }
        .titem { display:flex; align-items:center; padding:9px 4px; gap:12px;
            cursor:pointer; border-radius:6px; transition:background .1s; }
        .titem:active { background:rgba(255,255,255,.06); }
        .tnum  { width:28px; text-align:center; font-size:calc(14px * var(--s)); color:var(--light); flex-shrink:0; }
        .tnum.now { color:var(--green); font-size:calc(11px * var(--s)); }
        /* Indicateurs paroles */
        .lyr-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
        .lyr-dot-plain { background:rgba(255,255,255,.55); }
        @keyframes rainbow-dot {
            0%,100%{background:#ff6b6b}20%{background:#ffd93d}40%{background:#6bcb77}60%{background:#4d96ff}80%{background:#c77dff}
        }
        .lyr-dot-lrc { animation:rainbow-dot 2s linear infinite; }
        /* Bouton paroles karaoke */
        @keyframes rainbow-icon {
            0%,100%{color:#ff6b6b}20%{color:#ffd93d}40%{color:#6bcb77}60%{color:#4d96ff}80%{color:#c77dff}
        }
        #btn-lyrics.lyr-plain i  { color:#fff !important; opacity:1; }
        #btn-lyrics.lyr-lrc   i  { animation:rainbow-icon 2s linear infinite; }
        .tiinfo { flex:1; overflow:hidden; }
        .tittl  { font-size:calc(14px * var(--s)); font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .tittl.now { color:var(--green); }
        .tartst { font-size:calc(12px * var(--s)); color:var(--light); margin-top:1px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .pl-section { padding:10px 4px 4px; font-size:calc(12px * var(--s)); font-weight:700;
            letter-spacing:1.5px; text-transform:uppercase; color:var(--mid); }

        /* LYRICS VIEW */
        .lyr-hdr { background:linear-gradient(to bottom,#1a1a2e,#0f0f1a); padding:54px clamp(16px,6vw,80px) 16px;
            flex-shrink:0; display:flex; align-items:center; gap:12px; width:100%; }
        .lyr-mini-art { width:44px; height:44px; border-radius:4px; object-fit:cover; background:var(--grey); flex-shrink:0; }
        .lyr-meta { flex:1; overflow:hidden; }
        .lyr-track  { font-size:calc(15px * var(--s)); font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .lyr-artist { font-size:calc(13px * var(--s)); color:var(--light); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .lyr-body { flex:1; overflow-y:auto; padding:24px clamp(28px,8vw,120px) 100px; -webkit-overflow-scrolling:touch; background:var(--black);
                    width:100%; }
        .lyr-body::-webkit-scrollbar { display:none; }
        #lyr-lines { display:flex; flex-direction:column; gap:4px; }
        .lyr-line { font-size:calc(15px * var(--s)); font-weight:600; line-height:1.45; padding:4px 0;
            color:rgba(255,255,255,.25); transition:color .35s, font-size .2s; cursor:default; }
        .lyr-line.past { color:rgba(255,255,255,.15); }
        .lyr-line.now  { font-size:calc(18px * var(--s)); animation:rainbow-icon 2s linear infinite; }
        .lyr-empty { font-size:calc(32px * var(--s)); color:var(--mid); text-align:center; padding:48px 0; }
        .lyr-ctrl { position:absolute; bottom:0; left:0; right:0; z-index:4;
            background:linear-gradient(to top,rgba(0,0,0,.95) 70%,transparent);
            display:flex; align-items:center; justify-content:center; gap:60px; padding:20px 16px 28px; }
        .lyr-ctrl .cbtn-play { width:52px; height:52px; font-size:calc(22px * var(--s)); }

        /* MISC */
        @keyframes spin { to { transform:rotate(360deg); } }
        .spin { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,.2);
            border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
    </style>
</head>
<body>
<div id="phone">

    <div class="sbar">
        <span class="sbar-time" id="sbar-time">9:41</span>
        <div class="sbar-icons">
            <i class="fa-solid fa-signal"></i>
            <i class="fa-solid fa-wifi"></i>
            <i class="fa-solid fa-battery-three-quarters" style="font-size:30px"></i>
        </div>
    </div>

    <audio id="audio"></audio>

    <!-- VIEW 1 — PLAYER -->
    <div id="vp" class="view">
        <div class="pbg" id="player-bg"></div>
        <div class="pc">
            <div class="topbar">
                <button class="ibtn" id="btn-open-pl"><i class="fa-solid fa-chevron-down"></i></button>
                <div class="topbar-c">
                    <div class="topbar-ttl">AlbaFrancia FM</div>
                </div>
                <div class="topbar-actions">
                    <button class="ibtn dim" id="btn-fullscreen" title="Plein écran"><i class="fa-solid fa-expand"></i></button>
                    <button class="ibtn dim" id="btn-zoom-out" title="Texte plus petit" style="font-size:11px;font-weight:700;letter-spacing:-0.5px">A−</button>
                    <button class="ibtn dim" id="btn-zoom-in"  title="Texte plus grand" style="font-size:14px;font-weight:700;">A+</button>
                    <button class="ibtn dim" id="btn-lyrics"  title="Paroles"><i class="fa-solid fa-align-left"></i></button>
                    <button class="ibtn dim" id="btn-open-dl" title="Téléchargements hors-ligne"><i class="fa-solid fa-cloud-arrow-down"></i></button>
                </div>
            </div>

            <div class="art-wrap">
                <img id="artwork" class="art" src="cover.png" alt="AlbaFrancia FM">
            </div>

            <div id="mini-lyr" onclick="openLyrics()">
                <div class="ml-line ml-prev" id="ml-prev"></div>
                <div class="ml-line ml-curr" id="ml-curr"></div>
                <div class="ml-line ml-next" id="ml-next"></div>
            </div>

            <div class="tinfo">
                <div class="ttext">
                    <div class="ttitle"  id="track-title"><span class="spin"></span></div>
                    <div class="tartist" id="track-artist">AlbaFrancia FM</div>
                </div>
            </div>

            <div class="prog-wrap">
                <div class="prog-hit" id="prog-hit">
                    <div class="prog-rail">
                        <div class="prog-fill"  id="prog-fill"></div>
                        <div class="prog-thumb" id="prog-thumb"></div>
                    </div>
                </div>
                <div class="prog-times">
                    <span id="t-cur">0:00</span>
                    <span id="t-tot">0:00</span>
                </div>
            </div>

            <div class="ctrls">
                <button class="cbtn cbtn-mini active" id="btn-shuffle"><i class="fa-solid fa-shuffle"></i></button>
                <button class="cbtn cbtn-skip"        id="btn-prev"  ><i class="fa-solid fa-backward-step"></i></button>
                <button class="cbtn cbtn-play"        id="btn-play"  ><i class="fa-solid fa-play" id="play-icon"></i></button>
                <button class="cbtn cbtn-skip"        id="btn-next"  ><i class="fa-solid fa-forward-step"></i></button>
                <button class="cbtn cbtn-mini"        id="btn-repeat"><i class="fa-solid fa-repeat"></i></button>
            </div>

        </div>
    </div>

    <!-- VIEW 2 — PLAYLIST -->
    <div id="vpl" class="view">
        <div class="plhdr" id="pl-hdr">
            <div class="pltop">
                <button class="ibtn" id="btn-close-pl" style="font-size:18px;background:rgba(255,255,255,.18);border-radius:50%;width:40px;height:40px;flex-shrink:0;"><i class="fa-solid fa-chevron-left"></i></button>
                <span class="pltop-ttl">AlbaFrancia FM</span>
                <div style="width:60px"></div>
            </div>
            <div class="plhero">
                <img id="pl-cover" class="plcover" src="cover.png" alt="AlbaFrancia FM">
                <div class="plname">AlbaFrancia FM</div>
                <div class="pldesc">AlbaFrancia FM 🇦🇱</div>
                <div class="plmeta" id="pl-count">… titres</div>
            </div>
            <div class="plactions">
                <div></div>
                <div class="plbtns">
                    <button class="lbtn lbtn-outline" id="btn-pl-shuffle"><i class="fa-solid fa-shuffle"></i> Aléatoire</button>
                    <button class="lbtn lbtn-green"   id="btn-pl-play"  ><i class="fa-solid fa-play"></i> Lire</button>
                </div>
            </div>
        </div>
        <div class="tlist" id="track-list"></div>
    </div>

    <!-- VIEW 3 — LYRICS -->
    <div id="vlyr" class="view">
        <div class="lyr-hdr">
            <button class="ibtn" id="btn-close-lyr"><i class="fa-solid fa-chevron-down"></i></button>
            <img id="lyr-mini-art" class="lyr-mini-art" src="cover.png" alt="">
            <div class="lyr-meta">
                <div class="lyr-track"  id="lyr-title"></div>
                <div class="lyr-artist" id="lyr-artist"></div>
            </div>
            <div style="width:40px"></div>
        </div>
        <div class="lyr-body">
            <div id="lyr-lines"></div>
        </div>
        <div class="lyr-ctrl">
            <button class="cbtn cbtn-mini" id="lyr-prev"><i class="fa-solid fa-backward-step"></i></button>
            <button class="cbtn cbtn-play" id="lyr-play"><i class="fa-solid fa-play" id="lyr-play-icon"></i></button>
            <button class="cbtn cbtn-mini" id="lyr-next"><i class="fa-solid fa-forward-step"></i></button>

            <button class="ibtn" id="btn-close-dl"><i class="fa-solid fa-chevron-down"></i></button>
            <div class="dl-hdr-info">
                <div class="dl-hdr-ttl">Téléchargements</div>
                <div class="dl-hdr-sub" id="dl-stats">Calcul en cours…</div>
            </div>
            <button class="ibtn" id="btn-dl-all" title="Tout télécharger"><i class="fa-solid fa-cloud-arrow-down" id="dl-all-ico"></i></button>

            <div class="dl-prog-rail"><div class="dl-prog-fill" id="dl-prog-fill"></div></div>

<script>
'use strict';

// ══════════════════ CONFIG ════════════════════════════════════════════════
const CFG = Object.assign({
    radioName:      'AlbaFrancia FM',
    radioArtist:    'AlbaFrancia FM',
    jingleEveryMin: 2,
    jingleEveryMax: 4,
}, window.CONFIG || {});

const JINGLES   = window.JINGLES   || [];
const PLAYLIST  = window.PLAYLIST  || [];
const JINGLE_D  = 'jingles/';
const COVER     = 'cover.png';

// ══════════════════ STATE ═════════════════════════════════════════════════
// track = { file, dir }
let tracks    = PLAYLIST.map(file => ({ file, dir: 'music/' }));
const metaDb  = {};       // "dir+file" → { title, artist, coverUrl }
let curIdx    = 0;
let isPlaying = false;
let isShuffle = true;
let isRepeat  = false;
let shuf      = [];
// 0 = cover.png  1 = pochette MP3
let artState = 0;

// jingle state
let isJingle      = false;
let curJingleFile = null;
let jingleCtr     = 0;
let nextJingle    = rng(CFG.jingleEveryMin, CFG.jingleEveryMax);

// lyrics state
let lyricsData = [];
let lyricsSync = false;  // true = LRC with timestamps, false = plain text
let lyrOpen    = false;
let curLyrLine = -1;

function rng(a, b) { return a + Math.floor(Math.random() * (b - a + 1)); }

// ══════════════════ INDEXEDDB CACHE ══════════════════════════════════════
// Fonctionne sur HTTP simple (pas besoin de HTTPS contrairement au SW)
const IDB_NAME = 'albafm', IDB_STORE = 'audio';
let _db = null;
async function openIdb() {
    if (_db) return _db;
    return new Promise((res,rej)=>{
        const r=indexedDB.open(IDB_NAME,1);
        r.onupgradeneeded=e=>e.target.result.createObjectStore(IDB_STORE);
        r.onsuccess=e=>{_db=e.target.result;res(_db);};
        r.onerror=()=>rej(r.error);
    });
}
async function idbGet(key) {
    const d=await openIdb();
    return new Promise(res=>{
        const r=d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).get(key);
        r.onsuccess=()=>res(r.result??null); r.onerror=()=>res(null);
    });
}
async function idbPut(key,val) {
    const d=await openIdb();
    return new Promise((res,rej)=>{
        const tx=d.transaction(IDB_STORE,'readwrite');
        tx.objectStore(IDB_STORE).put(val,key);
        tx.oncomplete=res; tx.onerror=()=>rej(tx.error);
    });
}
async function idbHas(key) {
    const d=await openIdb();
    return new Promise(res=>{
        const r=d.transaction(IDB_STORE,'readonly').objectStore(IDB_STORE).count(key);
        r.onsuccess=()=>res(r.result>0); r.onerror=()=>res(false);
    });
}

const cacheMap   = {};   // url → true
const blobUrlMap = {};   // url → object URL (évite de recréer à chaque fois)

function trackUrl(i) {
    const t = tracks[i];
    // Laisser new URL encoder le nom de fichier (pas de pre-encode → pas de double-encodage)
    return new URL(t.dir + t.file, location.href).href;
}

async function refreshCacheMap() {
    await Promise.all(tracks.map(async (_,i) => {
        cacheMap[trackUrl(i)] = await idbHas(trackUrl(i));
    }));
}

function updateCacheIcons() {
    tList.querySelectorAll('[data-kind="music"]').forEach(el => {
        const i = +el.dataset.idx;
        const dot = el.querySelector('.titem-cache i');
        if (!dot) return;
        const cached = !!cacheMap[trackUrl(i)];
        dot.className = cached ? 'fa-solid fa-cloud-check' : 'fa-solid fa-cloud-arrow-down';
        dot.style.color = cached ? 'var(--green)' : 'var(--mid)';
        dot.style.opacity = cached ? '1' : '0.5';
    });
}

function dlLog(msg) {
    const el = document.getElementById('dl-error-log');
    if (!el) return;
    if (!el.dataset.init) {
        el.dataset.init = '1';
        const clr = document.createElement('button');
        clr.textContent = '✕ Effacer';
        clr.style.cssText = 'float:right;background:none;border:none;color:#ff8888;font-size:18px;cursor:pointer;';
        clr.onclick = () => { el.style.display='none'; el.innerHTML=''; delete el.dataset.init; };
        el.appendChild(clr);
    }
    el.style.display = 'block';
    const line = document.createElement('div');
    line.textContent = msg;
    el.appendChild(line);
}

async function cacheOneTrack(i) {
    const url = trackUrl(i);
    if (cacheMap[url]) return;
    try {
        const resp = await fetch(url);
        if (!resp.ok) {
            dlLog('HTTP ' + resp.status + '\nURL: ' + url + '\nPage: ' + location.href);
            return;
        }
        const blob = await resp.blob();
        if (!blob || blob.size === 0) { dlLog('Blob vide (' + blob?.size + ' bytes)\nURL: ' + url); return; }
        await idbPut(url, blob);
        cacheMap[url] = true;
    } catch(e) {
        dlLog('Erreur réseau — ' + (e?.message || e) + '\n  → ' + url);
    }
}


// ══════════════════ DOM ═══════════════════════════════════════════════════
const audio      = document.getElementById('audio');
const artwork    = document.getElementById('artwork');
const plCover    = document.getElementById('pl-cover');
const lyrMiniArt = document.getElementById('lyr-mini-art');
const tTitle     = document.getElementById('track-title');
const tArtist    = document.getElementById('track-artist');
const pFill      = document.getElementById('prog-fill');
const pThumb     = document.getElementById('prog-thumb');
const pHit       = document.getElementById('prog-hit');
const tCur       = document.getElementById('t-cur');
const tTot       = document.getElementById('t-tot');
const tList      = document.getElementById('track-list');
const playIcon   = document.getElementById('play-icon');
const lyrPlIcon  = document.getElementById('lyr-play-icon');
const lyrLines   = document.getElementById('lyr-lines');
const lyrTitle   = document.getElementById('lyr-title');
const lyrArtist  = document.getElementById('lyr-artist');
const plCount    = document.getElementById('pl-count');
const playerBg   = document.getElementById('player-bg');

// ══════════════════ XHR ═══════════════════════════════════════════════════
function xget(url, type, ok, fail) {
    const r = new XMLHttpRequest();
    r.open('GET', url, true);
    r.responseType = type;
    r.onload  = () => (r.status === 0 || r.status === 200) ? ok(r.response) : fail && fail();
    r.onerror = () => fail && fail();
    r.send();
}

// ══════════════════ ID3v2 PARSER ══════════════════════════════════════════
function parseId3(buf) {
    const b = new Uint8Array(buf);
    const R = { title:null, artist:null, coverUrl:null, lyrics:null };
    if (b.length < 10 || b[0]!==73||b[1]!==68||b[2]!==51) return R;
    const ver = b[3], flgs = b[5];
    const tEnd = 10+(((b[6]&0x7F)<<21)|((b[7]&0x7F)<<14)|((b[8]&0x7F)<<7)|(b[9]&0x7F));
    let p = 10;
    if (ver>=3 && (flgs&0x40)) p += 4+((b[p]<<24)|(b[p+1]<<16)|(b[p+2]<<8)|b[p+3]);
    const end = Math.min(tEnd, b.length);
    while (p+(ver<3?6:10) < end) {
        let id, sz, hl;
        if (ver<3) { id=String.fromCharCode(b[p],b[p+1],b[p+2]); sz=(b[p+3]<<16)|(b[p+4]<<8)|b[p+5]; hl=6; }
        else {
            id=String.fromCharCode(b[p],b[p+1],b[p+2],b[p+3]);
            sz=ver>=4?(((b[p+4]&0x7F)<<21)|((b[p+5]&0x7F)<<14)|((b[p+6]&0x7F)<<7)|(b[p+7]&0x7F)):((b[p+4]<<24)|(b[p+5]<<16)|(b[p+6]<<8)|b[p+7]);
            hl=10;
        }
        if (sz<=0||sz>6_000_000) break;
        const fd = b.slice(p+hl, p+hl+sz);
        if ((id==='TIT2'||id==='TT2')  && !R.title)    R.title    = id3Txt(fd);
        if ((id==='TPE1'||id==='TP1')  && !R.artist)   R.artist   = id3Txt(fd);
        if ((id==='APIC'||id==='PIC')  && !R.coverUrl) R.coverUrl = id3Pic(fd, ver<3);
        if ((id==='USLT'||id==='ULT')  && !R.lyrics)   R.lyrics   = id3Uslt(fd);
        if (R.title && R.artist && R.coverUrl && R.lyrics) break;
        p += hl+sz;
    }
    return R;
}
function id3Txt(d) {
    if (!d||!d.length) return null;
    const enc=d[0], raw=d.slice(1);
    try {
        let s;
        if (enc===1) { const le=(raw[0]===0xFF&&raw[1]===0xFE); s=new TextDecoder(le?'utf-16le':'utf-16be').decode(le?raw.slice(2):raw); }
        else if (enc===2) s=new TextDecoder('utf-16be').decode(raw);
        else if (enc===3) s=new TextDecoder('utf-8').decode(raw);
        else s=new TextDecoder('latin1').decode(raw);
        return s.replace(/\0/g,'').trim()||null;
    } catch { return null; }
}
function id3Pic(d, v22) {
    if (!d||d.length<4) return null;
    try {
        let i=0; const enc=d[i++]; let mime;
        if (v22) { const f=String.fromCharCode(d[i++],d[i++],d[i++]); mime=(f==='PNG')?'image/png':'image/jpeg'; }
        else { mime=''; while(i<d.length&&d[i]!==0) mime+=String.fromCharCode(d[i++]); i++; }
        i++;
        if (enc===1||enc===2) { while(i<d.length-1&&!(d[i]===0&&d[i+1]===0)) i+=2; i+=2; }
        else { while(i<d.length&&d[i]!==0) i++; i++; }
        const pic=d.slice(i);
        if (pic.length<8) return null;
        return URL.createObjectURL(new Blob([pic],{type:mime||'image/jpeg'}));
    } catch { return null; }
}
function id3Uslt(d) {
    // USLT: [enc:1][lang:3][descriptor:null-term][lyrics]
    if (!d||d.length<5) return null;
    try {
        const enc=d[0]; let i=4; // skip enc+lang
        if (enc===1||enc===2) { while(i<d.length-1&&!(d[i]===0&&d[i+1]===0))i+=2; i+=2; }
        else { while(i<d.length&&d[i]!==0)i++; i++; }
        if (i>=d.length) return null;
        const raw=d.slice(i);
        const fake=new Uint8Array(raw.length+1); fake[0]=enc; fake.set(raw,1);
        const txt=id3Txt(fake);
        return txt?.trim()||null;
    } catch { return null; }
}

// ══════════════════ TRACK MODEL ═══════════════════════════════════════════
function trackKey(i) { return tracks[i].dir + tracks[i].file; }
function cleanName(f) { return f.replace(/^\d+[-‐.]\d*\s*/,'').replace(/\.mp3$/i,'').trim(); }
function getTitle(i)  { return metaDb[trackKey(i)]?.title  || cleanName(tracks[i].file); }
function getArtist(i) { return metaDb[trackKey(i)]?.artist || CFG.radioArtist; }

// ══════════════════ META LOADING ══════════════════════════════════════════
const mQueue = []; let mBusy = false;
function loadMeta(idx, cb) {
    const key = trackKey(idx);
    if (metaDb[key]) { cb&&cb(metaDb[key]); return; }
    const t = tracks[idx];
    xget(t.dir + encodeURIComponent(t.file), 'arraybuffer', buf => {
        const m = parseId3(buf);
        // Pré-détecte le type de paroles depuis USLT
        if (m.lyrics) m.lyrType = parseLrc(m.lyrics) ? 'lrc' : 'plain';
        metaDb[key] = m; cb&&cb(m);
    }, () => { metaDb[key]={}; cb&&cb({}); });
}
function queueAll() {
    for (let i=0; i<tracks.length; i++) if (!metaDb[trackKey(i)]) mQueue.push(i);
    pump();
}
function pump() {
    while (mQueue.length) {
        const idx=mQueue.shift();
        if (!tracks[idx]) continue;
        if (metaDb[trackKey(idx)]) { updateItem(idx); continue; }
        mBusy=true;
        loadMeta(idx, () => { updateItem(idx); if(idx===curIdx) refreshPlayer(); mBusy=false; setTimeout(pump,0); });
        return;
    }
    mBusy=false;
}

// ══════════════════ DYNAMIC BG COLOR ══════════════════════════════════════
const _cvs = document.createElement('canvas');
const _ctx = _cvs.getContext('2d', { willReadFrequently: true });
function extractBgColor(imgEl, cb) {
    _cvs.width = _cvs.height = 40;
    try {
        _ctx.drawImage(imgEl, 0, 0, 40, 40);
        const d = _ctx.getImageData(0, 0, 40, 40).data;
        let r=0,g=0,b=0,n=0;
        for (let i=0;i<d.length;i+=16){ r+=d[i]; g+=d[i+1]; b+=d[i+2]; n++; }
        r=Math.round(r/n); g=Math.round(g/n); b=Math.round(b/n);
        cb(Math.round(r*.45), Math.round(g*.45), Math.round(b*.45));
    } catch { cb(74,32,32); }
}
function applyBgColor(r,g,b) {
    const grad = `linear-gradient(160deg,rgb(${r},${g},${b}) 0%,rgb(${Math.round(r*.6)},${Math.round(g*.6)},${Math.round(b*.6)}) 25%,rgb(${Math.round(r*.35)},${Math.round(g*.35)},${Math.round(b*.35)}) 45%,var(--black) 68%)`;
    playerBg.style.background = grad;
}

function setCovers(src) {
    [artwork, plCover, lyrMiniArt].forEach(el => {
        el.src = src;
        if (!isJingle) el.onload = () => extractBgColor(el, applyBgColor);
    });
}

function applyArtState() {
    if (isJingle) return;
    if (artState === 0) {
        setCovers(COVER);
    } else {
        const src = metaDb[trackKey(curIdx)]?.coverUrl || COVER;
        setCovers(src);
    }
    artwork.classList.toggle('locked', artState === 1);
}
function setMarquee(el, text) {
    el.innerHTML = `<span class="marquee-inner">${text}</span>`;
    el.classList.remove('scrolling');
    // mesure après paint
    requestAnimationFrame(() => {
        const inner = el.querySelector('.marquee-inner');
        const overflow = inner.scrollWidth - el.clientWidth;
        if (overflow > 4) {
            const shift = -overflow;
            const dur   = Math.max(4, overflow / 40); // ~40px/s
            el.style.setProperty('--mq-shift', shift + 'px');
            el.style.setProperty('--mq-dur',   dur   + 's');
            el.classList.add('scrolling');
        }
    });
}
function refreshPlayer() {
    if (isJingle) return;
    setMarquee(tTitle, getTitle(curIdx));
    tArtist.textContent = getArtist(curIdx);
    lyrTitle.textContent  = getTitle(curIdx);
    lyrArtist.textContent = getArtist(curIdx);
    applyArtState();
}
function refreshBtn() {
    const ic = isPlaying ? 'fa-pause' : 'fa-play';
    playIcon.className  = 'fa-solid ' + ic;
    lyrPlIcon.className = 'fa-solid ' + ic;
}

// ══════════════════ PLAYER CORE ═══════════════════════════════════════════
async function loadTrack(idx, play=false) {
    curIdx   = idx;
    isJingle = false; curJingleFile = null;
    artState = 0;
    const t  = tracks[idx];
    // Utiliser le blob IDB si disponible (offline), sinon URL réseau
    const url  = trackUrl(idx);
    const blob = await idbGet(url);
    if (blob) {
        if (!blobUrlMap[url]) blobUrlMap[url] = URL.createObjectURL(blob);
        audio.src = blobUrlMap[url];
    } else {
        audio.src = url; // URL réseau absolue (même que trackUrl)
    }
    tTitle.innerHTML    = '<span class="spin"></span>';
    tArtist.textContent = CFG.radioArtist;
    lyrTitle.textContent = lyrArtist.textContent = '';
    artwork.classList.remove('locked');
    setCovers(COVER);
    resetProgress();
    playerBg.style.background = '';
    lyricsData=[]; lyricsSync=false; curLyrLine=-1; updateLyrBtn(); updateMiniLyr(-1);
    highlightList();

    if (metaDb[trackKey(idx)]) refreshPlayer();
    else loadMeta(idx, ()=>refreshPlayer());

    useLyrFallback(idx);

    if (play) {
        audio.play().then(()=>{ isPlaying=true; refreshBtn(); artwork.classList.add('pulse'); }).catch(()=>{});
    }
}

function togglePlay() {
    if (isPlaying) {
        audio.pause(); isPlaying=false; artwork.classList.remove('pulse'); refreshBtn();
    } else {
        audio.play().then(()=>{ isPlaying=true; artwork.classList.add('pulse'); refreshBtn(); }).catch(()=>{});
    }
}

function buildShuffle() {
    shuf=[...Array(tracks.length).keys()];
    for (let i=shuf.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [shuf[i],shuf[j]]=[shuf[j],shuf[i]]; }
}
function getAdj(dir) {
    if (isShuffle) { const p=shuf.indexOf(curIdx); return shuf[(p+dir+shuf.length)%shuf.length]; }
    return (curIdx+dir+tracks.length)%tracks.length;
}
function nextTrack() {
    if (isJingle) { isJingle=false; curJingleFile=null; loadTrack(getAdj(+1), isPlaying); return; }
    jingleCtr++;
    if (JINGLES.length && jingleCtr>=nextJingle) {
        jingleCtr=0; nextJingle=rng(CFG.jingleEveryMin, CFG.jingleEveryMax);
        playJingle();
    } else {
        loadTrack(getAdj(+1), isPlaying);
    }
}
function prevTrack() {
    if (audio.currentTime>3) { audio.currentTime=0; return; }
    if (isJingle) { isJingle=false; curJingleFile=null; }
    loadTrack(getAdj(-1), isPlaying);
}

function resetProgress() {
    pFill.style.width='0%'; pThumb.style.left='0%';
    tCur.textContent='0:00'; tTot.textContent='0:00';
}
const fmt = s => isFinite(s) ? `${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}` : '0:00';

audio.addEventListener('timeupdate', () => {
    const pct = audio.duration ? audio.currentTime/audio.duration*100 : 0;
    pFill.style.width=pct+'%'; pThumb.style.left=pct+'%';
    tCur.textContent=fmt(audio.currentTime); tTot.textContent=fmt(audio.duration);
    syncLyrics(audio.currentTime);
});
audio.addEventListener('ended', () => {
    artwork.classList.remove('pulse');
    isPlaying=false; refreshBtn();
    if (isRepeat) { audio.currentTime=0; audio.play(); return; }
    if (isJingle) { isJingle=false; curJingleFile=null; loadTrack(getAdj(+1), true); return; }
    jingleCtr++;
    if (JINGLES.length && jingleCtr>=nextJingle) {
        jingleCtr=0; nextJingle=rng(CFG.jingleEveryMin, CFG.jingleEveryMax);
        playJingle();
    } else {
        loadTrack(getAdj(+1), true);
    }
});

function seek(e) {
    const r=pHit.getBoundingClientRect(), x=(e.touches?.[0]||e).clientX;
    if (isFinite(audio.duration)) audio.currentTime=Math.max(0,Math.min(1,(x-r.left)/r.width))*audio.duration;
}
pHit.addEventListener('click', seek);
pHit.addEventListener('touchstart', e=>{e.preventDefault();seek(e);},{passive:false});
pHit.addEventListener('touchmove',  e=>{e.preventDefault();seek(e);},{passive:false});

// ══════════════════ JINGLES ═══════════════════════════════════════════════
async function _setJingleSrc(j) {
    const url = jingleUrl(j);
    const blob = await idbGet(url);
    if (blob) {
        if (!blobUrlMap[url]) blobUrlMap[url] = URL.createObjectURL(blob);
        audio.src = blobUrlMap[url];
    } else {
        audio.src = jingleUrl(j); // URL absolue cohérente
    }
}
async function prepJingle() {
    if (!JINGLES.length) { loadTrack(0); return; }
    const j = JINGLES[Math.floor(Math.random()*JINGLES.length)];
    isJingle=true; curJingleFile=j;
    await _setJingleSrc(j);
    setMarquee(tTitle, CFG.radioName);
    tArtist.textContent = CFG.radioArtist;
    lyrTitle.textContent = lyrArtist.textContent = '';
    setCovers(COVER);
    playerBg.style.background = 'linear-gradient(160deg,#1a2a4a 0%,#0f1a2a 25%,#0a1015 45%,var(--black) 68%)';
    lyricsData=[]; updateLyrBtn();
    highlightList();
}
async function playJingle(forced=null) {
    if (!JINGLES.length) { nextTrack(); return; }
    const j = forced ?? JINGLES[Math.floor(Math.random()*JINGLES.length)];
    isJingle=true; curJingleFile=j;
    await _setJingleSrc(j);
    setMarquee(tTitle, CFG.radioName);
    tArtist.textContent = CFG.radioArtist;
    lyrTitle.textContent = lyrArtist.textContent = '';
    setCovers(COVER);
    playerBg.style.background = 'linear-gradient(160deg,#1a2a4a 0%,#0f1a2a 25%,#0a1015 45%,var(--black) 68%)';
    lyricsData=[]; updateLyrBtn();
    if (lyrOpen) closeLyrics();
    resetProgress();
    highlightList();
    audio.play().then(()=>{ isPlaying=true; refreshBtn(); artwork.classList.add('pulse'); }).catch(()=>{});
}

// ══════════════════ CYCLE POCHETTE → MP3 ════════════════════════════════
artwork.addEventListener('click', () => {
    if (isJingle) return;
    artState = artState === 0 ? 1 : 0;
    if (artState === 0) {
        setCovers(COVER);
        artwork.classList.remove('locked');
    } else {
        const src = metaDb[trackKey(curIdx)]?.coverUrl || COVER;
        setCovers(src);
        artwork.classList.add('locked');
    }
});

// ══════════════════ PAROLES ═══════════════════════════════════════════════
function parseLrc(txt) {
    // Retourne [{t, tx}] si LRC valide, sinon null
    const lines = txt.split(/\r?\n/);
    const result = [];
    for (const line of lines) {
        const m = line.match(/^\[(\d+):(\d+(?:\.\d+)?)\](.*)/);
        if (m) {
            const t = parseInt(m[1]) * 60 + parseFloat(m[2]);
            const tx = m[3].trim();
            if (tx) result.push({ t, tx });
        }
    }
    return result.length >= 2 ? result : null;
}
function plainLyrics(txt) {
    return txt.split(/\r?\n/)
        .map(l=>l.replace(/^\[.*?\]/g,'').trim())
        .filter(l=>l)
        .map(tx=>({ t:-1, tx }));
}
function applyLyrics(txt, meta) {
    const lrc = parseLrc(txt);
    if (lrc) {
        lyricsData = lrc; lyricsSync = true;
        if (meta) meta.lyrType = 'lrc';
    } else {
        lyricsData = plainLyrics(txt); lyricsSync = false;
        if (meta) meta.lyrType = 'plain';
    }
}
function useLyrFallback(idx) {
    const key = trackKey(idx);
    const meta = metaDb[key];
    if (!meta) { loadMeta(idx, ()=>useLyrFallback(idx)); return; }

    // 1. Fichier .lrc externe (priorité sur USLT)
    const t = tracks[idx];
    const lrcUrl = t.dir + encodeURIComponent(t.file.replace(/\.mp3$/i, '.lrc'));
    xget(lrcUrl, 'text', txt => {
        if (txt && txt.trim()) {
            applyLyrics(txt, meta);
        } else if (meta.lyrics) {
            // 2. USLT fallback
            applyLyrics(meta.lyrics, meta);
        } else {
            lyricsData = []; lyricsSync = false; meta.lyrType = 'none';
        }
        updateLyrBtn(); if (lyrOpen) renderLyrics();
        renderMusicItem(idx);
    }, () => {
        lyricsData = []; lyricsSync = false; meta.lyrType = 'none';
        updateLyrBtn(); if (lyrOpen) renderLyrics();
    });
}
function updateLyrBtn() {
    const btn = document.getElementById('btn-lyrics');
    const has = lyricsData.length > 0;
    btn.classList.toggle('dim', !has);
    btn.style.pointerEvents = has ? 'auto' : 'none';
    btn.classList.toggle('lyr-plain', has && !lyricsSync);
    btn.classList.toggle('lyr-lrc',   has &&  lyricsSync);
}
function renderLyrics() {
    curLyrLine=-1;
    if (!lyricsData.length) {
        lyrLines.innerHTML='<div class="lyr-empty">Pas de paroles disponibles</div>';
        return;
    }
    if (!lyricsSync) {
        // Plain text — toutes les lignes visibles d'un coup
        lyrLines.innerHTML = lyricsData.map(l=>
            `<div class="lyr-line" style="color:rgba(255,255,255,.85);font-size:22px">${esc(l.tx)}</div>`
        ).join('');
    } else {
        lyrLines.innerHTML = lyricsData.map((l,i)=>
            `<div class="lyr-line" data-i="${i}">${esc(l.tx)}</div>`
        ).join('');
    }
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function updateMiniLyr(idx) {
    const box = document.getElementById('mini-lyr');
    const prev = document.getElementById('ml-prev');
    const curr = document.getElementById('ml-curr');
    const next = document.getElementById('ml-next');
    if (!box) return;
    if (!lyricsData.length || !lyricsSync || idx < 0) {
        box.classList.remove('has-lyr');
        prev.textContent = curr.textContent = next.textContent = '';
        return;
    }
    prev.textContent = idx > 0 ? lyricsData[idx-1].tx : '';
    curr.textContent = lyricsData[idx].tx;
    next.textContent = idx < lyricsData.length-1 ? lyricsData[idx+1].tx : '';
    box.classList.add('has-lyr');
}
function syncLyrics(t) {
    if (!lyricsData.length||!lyricsSync) return;  // plain text = pas de sync
    let idx=-1;
    for (let i=0;i<lyricsData.length;i++) { if(lyricsData[i].t<=t) idx=i; else break; }
    updateMiniLyr(idx);
    if (!lyrOpen) return;
    if (idx===curLyrLine) return;
    curLyrLine=idx;
    lyrLines.querySelectorAll('.lyr-line').forEach((el,i) => {
        el.className='lyr-line'+(i===idx?' now':i<idx?' past':'');
    });
    if (idx>=0) {
        const activeLine = lyrLines.querySelectorAll('.lyr-line')[idx];
        const lyrBody = document.querySelector('.lyr-body');
        if (activeLine && lyrBody) {
            const top = activeLine.getBoundingClientRect().top - lyrBody.getBoundingClientRect().top + lyrBody.scrollTop;
            lyrBody.scrollTo({top: top - lyrBody.clientHeight/2 + activeLine.clientHeight/2, behavior:'smooth'});
        }
    }
}
function openLyrics() {
    if (!lyricsData.length) return;
    lyrOpen=true; document.body.classList.add('lyr-open');
    renderLyrics(); syncLyrics(audio.currentTime);
}
function closeLyrics() {
    lyrOpen=false; document.body.classList.remove('lyr-open');
}

// ══════════════════ TRACK LIST ════════════════════════════════════════════
function buildList() {
    tList.innerHTML='';
    plCount.textContent = tracks.length + ' titres · ' + JINGLES.length + ' jingle';

    tracks.forEach((t,i)=>{
        const d=document.createElement('div');
        d.className='titem'; d.dataset.kind='music'; d.dataset.idx=i;
        renderMusicItem(i,d);
        d.addEventListener('click', e => {
            if (e.target.closest('.titem-cache')) {
                e.stopPropagation();
                const idx = +d.dataset.idx;
                if (cacheMap[trackUrl(idx)]) return;
                const ico = d.querySelector('.titem-cache i');
                ico.className = 'fa-solid fa-spinner fa-spin';
                cacheOneTrack(idx).then(()=>{
                    if (cacheMap[trackUrl(idx)]) {
                        renderMusicItem(idx);
                    } else {
                        // échec visible : croix rouge 2s puis retour
                        ico.className = 'fa-solid fa-circle-xmark';
                        ico.style.color = 'var(--red,#e55)';
                        setTimeout(()=>renderMusicItem(idx), 2000);
                    }
                });
                return;
            }
            if (e.target.closest('.drag-handle')) return;
            loadTrack(i,true); closePl();
        });
        tList.appendChild(d);
    });

    if (JINGLES.length) {
        const sep=document.createElement('div');
        sep.className='pl-section'; sep.textContent='Jingles Radio';
        tList.appendChild(sep);
        JINGLES.forEach((f,i)=>{
            const d=document.createElement('div');
            d.className='titem'; d.dataset.kind='jingle'; d.dataset.idx=i;
            renderJingleItem(f,d);
            d.addEventListener('click',()=>{ playJingle(f); closePl(); });
            tList.appendChild(d);
        });
    }
}
function renderMusicItem(i, el) {
    const d=el||tList.querySelector(`[data-kind="music"][data-idx="${i}"]`); if(!d)return;
    const now=(i===curIdx&&!isJingle);
    const cached = !!cacheMap[trackUrl(i)];
    const cIco = cached ? 'fa-solid fa-cloud-check' : 'fa-solid fa-cloud-arrow-down';
    const cCol = cached ? 'var(--green)' : 'var(--mid)';
    const cOpa = cached ? '1' : '0.5';
    const lt = metaDb[trackKey(i)]?.lyrType;
    const dot = lt === 'lrc'   ? '<span class="lyr-dot lyr-dot-lrc"></span>'
              : lt === 'plain' ? '<span class="lyr-dot lyr-dot-plain"></span>'
              : '';
    d.innerHTML=
        `<div class="drag-handle"><i class="fa-solid fa-grip-lines"></i></div>
         <div class="tnum${now?' now':''}">${now?'<i class="fa-solid fa-volume-high"></i>':i+1}</div>
         <div class="tiinfo">
           <div class="tittl${now?' now':''}">${esc(getTitle(i))}</div>
           <div class="tartst">${esc(getArtist(i))}</div>
         </div>
         ${dot}
         <span class="titem-cache"><i class="${cIco}" style="color:${cCol};opacity:${cOpa}"></i></span>`;
}
function renderJingleItem(f, el) {
    const jIdx=JINGLES.indexOf(f);
    const d=el||tList.querySelector(`[data-kind="jingle"][data-idx="${jIdx}"]`); if(!d)return;
    const now=(isJingle&&curJingleFile===f);
    d.innerHTML=
        `<div class="tnum${now?' now':''}">
           ${now?'<i class="fa-solid fa-volume-high"></i>':'<i class="fa-solid fa-radio" style="font-size:13px;color:var(--mid)"></i>'}
         </div>
         <div class="tiinfo">
           <div class="tittl${now?' now':''}">${esc(f.replace(/\.mp3$/i,''))}</div>
           <div class="tartst">${esc(CFG.radioName)}</div>
         </div>
`;
}
function updateItem(i) { renderMusicItem(i); }
function highlightList() {
    tList.querySelectorAll('[data-kind="music"]').forEach(el=>renderMusicItem(+el.dataset.idx,el));
    tList.querySelectorAll('[data-kind="jingle"]').forEach(el=>renderJingleItem(JINGLES[+el.dataset.idx],el));
}

// ══════════════════ DOWNLOAD MANAGER ════════════════════════════════════════
function jingleUrl(f) { return new URL('jingles/' + f, location.href).href; }

async function autoDownloadJingles() {
    for (const f of JINGLES) {
        const url = jingleUrl(f);
        if (await idbHas(url)) { cacheMap[url] = true; continue; }
        try {
            const r = await fetch(url);
            if (r.ok) {
                await idbPut(url, await r.blob());
                cacheMap[url] = true;
            }
        } catch(e) { dlLog('Jingle erreur — ' + f + ' : ' + (e?.message || e)); }
        // rafraîchir la ligne dans le DL manager si ouvert
        if (document.body.classList.contains('dl-open')) buildDlList();
    }
}

function dlStats() {
    const total = tracks.length;
    const cached = tracks.filter((_,i) => cacheMap[trackUrl(i)]).length;
    const jTotal = JINGLES.length;
    const jCached = JINGLES.filter(f => cacheMap[jingleUrl(f)]).length;
    return { total, cached, jTotal, jCached };
}

function updateDlStats() {
    const s = dlStats();
    const el = document.getElementById('dl-stats');
    if (!el) return;
    const allOk = s.cached === s.total && s.jCached === s.jTotal;
    const ico   = document.getElementById('btn-open-dl')?.querySelector('i');
    if (allOk) {
        el.textContent = `${s.total} morceaux · ${s.jTotal} jingles — tout disponible hors-ligne ✓`;
        if (ico) { ico.className='fa-solid fa-cloud-check'; document.getElementById('btn-open-dl').style.color='var(--green)'; document.getElementById('btn-open-dl').classList.remove('dim'); }
    } else {
        el.textContent = `${s.cached}/${s.total} morceaux · ${s.jCached}/${s.jTotal} jingles téléchargés`;
        if (ico) { ico.className='fa-solid fa-cloud-arrow-down'; document.getElementById('btn-open-dl').style.color=''; document.getElementById('btn-open-dl').classList.add('dim'); }
    }
}

function buildDlList() {
    const list = document.getElementById('dl-list');
    list.innerHTML = '';
    updateDlStats();

    // Morceaux
    const secM = document.createElement('div');
    secM.className = 'dl-section'; secM.textContent = 'Morceaux';
    list.appendChild(secM);

    tracks.forEach((t, i) => {
        const url = trackUrl(i);
        const cached = !!cacheMap[url];
        const d = document.createElement('div');
        d.className = 'dl-item'; d.dataset.dlIdx = i; d.dataset.dlType = 'track';
        d.innerHTML =
            `<div class="dl-item-info">
               <div class="dl-item-ttl">${esc(getTitle(i))}</div>
               <div class="dl-item-sub">${esc(getArtist(i))}</div>
             </div>
             <button class="dl-item-btn${cached?' cached':''}" title="${cached?'Téléchargé':'Télécharger'}">
               <i class="${cached?'fa-solid fa-cloud-check':'fa-solid fa-cloud-arrow-down'}"></i>
             </button>`;
        list.appendChild(d);
    });

    // Jingles
    if (JINGLES.length) {
        const secJ = document.createElement('div');
        secJ.className = 'dl-section'; secJ.textContent = 'Jingles — téléchargés automatiquement';
        list.appendChild(secJ);
        JINGLES.forEach((f, i) => {
            const url = jingleUrl(f);
            const cached = !!cacheMap[url];
            const d = document.createElement('div');
            d.className = 'dl-item';
            d.innerHTML =
                `<div class="dl-item-info">
                   <div class="dl-item-ttl">${esc(f.replace(/\.mp3$/i,''))}</div>
                   <div class="dl-item-sub">Jingle radio</div>
                 </div>
                 <button class="dl-item-btn${cached?' cached':''}" disabled>
                   <i class="${cached?'fa-solid fa-cloud-check':'fa-solid fa-cloud-arrow-down'}" style="opacity:${cached?'1':'0.4'}"></i>
                 </button>`;
            list.appendChild(d);
        });
    }
}

// Délégation des clics dans la liste DL
document.addEventListener('click', async e => {

// ══════════════════ DRAG & DROP PLAYLIST ════════════════════════════════════
let _drgIdx=null, _drgEl=null, _drgOver=null;

function initDragDrop() { // appelé une seule fois (pas dans buildList)
    tList.addEventListener('touchstart', e=>{
        const h=e.target.closest('.drag-handle'); if(!h) return;
        const item=h.closest('[data-kind="music"]'); if(!item) return;
        e.preventDefault();
        _drgIdx=+item.dataset.idx; _drgEl=item;
        item.classList.add('dragging');
    },{passive:false});

    tList.addEventListener('touchmove', e=>{
        if(_drgEl===null) return;
        e.preventDefault();
        const y=e.touches[0].clientY;
        tList.querySelectorAll('.drop-top,.drop-bot').forEach(el=>el.classList.remove('drop-top','drop-bot'));
        _drgOver=null;
        for(const el of tList.querySelectorAll('[data-kind="music"]')) {
            if(el===_drgEl) continue;
            const r=el.getBoundingClientRect();
            if(y>=r.top && y<r.bottom) {
                const before=y<r.top+r.height/2;
                el.classList.add(before?'drop-top':'drop-bot');
                _drgOver={el, before};
                break;
            }
        }
    },{passive:false});

    tList.addEventListener('touchend', e=>{
        if(_drgEl===null) return;
        _drgEl.classList.remove('dragging');
        tList.querySelectorAll('.drop-top,.drop-bot').forEach(el=>el.classList.remove('drop-top','drop-bot'));
        if(_drgOver) reorderTrack(_drgIdx, +_drgOver.el.dataset.idx, _drgOver.before);
        _drgEl=null; _drgIdx=null; _drgOver=null;
    },{passive:true});
}

function reorderTrack(from, to, insertBefore) {
    if(from===to) return;
    const curTrack=tracks[curIdx];
    const arr=[...tracks];
    const [moved]=arr.splice(from,1);
    const dest=insertBefore
        ? (to>from ? to-1 : to)
        : (to>from ? to : to+1);
    arr.splice(Math.max(0,Math.min(dest,arr.length)),0,moved);
    tracks.length=0; tracks.push(...arr);
    curIdx=tracks.indexOf(curTrack);
    buildShuffle();
    refreshCacheMap().then(()=>{ buildList(); highlightList(); });
}

// ══════════════════ TAILLE DES POLICES ════════════════════════════════════
(function() {
    let scale = parseFloat(localStorage.getItem('albafm-uiscale') || '1');
    const STEP = 0.2;
    const flash = btn => { btn.style.opacity='1'; setTimeout(()=>btn.style.opacity='',200); };
    const apply = (v, btn) => {
        const next = Math.min(2.4, Math.max(0.5, v));
        if (next === scale) return;
        scale = next;
        document.documentElement.style.setProperty('--s', scale);
        localStorage.setItem('albafm-uiscale', scale);
        if (btn) flash(btn);
    };
    apply(scale);
    document.getElementById('btn-zoom-out')?.addEventListener('click', e => apply(scale - STEP, e.currentTarget));
    document.getElementById('btn-zoom-in') ?.addEventListener('click', e => apply(scale + STEP, e.currentTarget));
})();

// ══════════════════ PLEIN ÉCRAN ═══════════════════════════════════════════
(function() {
    const btn = document.getElementById('btn-fullscreen');
    if (!btn) return;
    function updateIcon() {
        const ico = btn.querySelector('i');
        if (!ico) return;
        const fs = !!(document.fullscreenElement || document.webkitFullscreenElement);
        ico.className = fs ? 'fa-solid fa-compress' : 'fa-solid fa-expand';
        btn.classList.toggle('dim', !fs);
    }
    btn.addEventListener('click', async () => {
        try {
            const fs = !!(document.fullscreenElement || document.webkitFullscreenElement);
            if (!fs) {
                const el = document.documentElement;
                await (el.requestFullscreen?.() ?? el.webkitRequestFullscreen?.());
            } else {
                await (document.exitFullscreen?.() ?? document.webkitExitFullscreen?.());
            }
        } catch(e) {}
        updateIcon();
    });
    document.addEventListener('fullscreenchange', updateIcon);
    document.addEventListener('webkitfullscreenchange', updateIcon);
})();
